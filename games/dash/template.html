// ---------------- あいことば (パスワードセーブ) ----------------
const PW_KANA='あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみ';
const PW_VER=3;
// v3以降: あいことばは「ステージ」と「かぞくLv」だけを保存する簡易版。
// カードは毎回ステージ開始時にレベル数ぶん選び直す(引き継ぎなし)。
const Password = {
  encode(state){
    // state: {stage(1-3), lv}
    const bits=[];
    const push=(v,n)=>{for(let i=n-1;i>=0;i--)bits.push((v>>i)&1);};
    push(PW_VER,3); push(state.stage,2); push(state.lv,4);
    while(bits.length%5!==0)bits.push(0);
    let out='',sum=0;
    for(let i=0;i<bits.length;i+=5){
      let v=0;for(let j=0;j<5;j++)v=(v<<1)|bits[i+j];
      sum=(sum+v)%32;
      out+=PW_KANA[v];
    }
    out+=PW_KANA[sum];
    return out;
  },
  decode(str){
    str=(str||'').trim().replace(/[\s、。･・]/g,'');
    if(str.length<2)return null;
    const vals=[];
    for(const ch of str){
      const v=PW_KANA.indexOf(ch);
      if(v<0)return null;
      vals.push(v);
    }
    const chk=vals.pop();
    let sum=0;for(const v of vals)sum=(sum+v)%32;
    if(sum!==chk)return null;
    const bits=[];
    for(const v of vals)for(let i=4;i>=0;i--)bits.push((v>>i)&1);
    let pos=0;
    const read=(n)=>{let v=0;for(let i=0;i<n;i++)v=(v<<1)|(bits[pos++]||0);return v;};
    if(read(3)!==PW_VER)return null;
    const stage=read(2),lv=read(4);
    if(stage<1||stage>3)return null;
    if(lv<1||lv>BAL.lvMax)return null;
    return {stage,lv,crystals:0,picks:{}};
  },
};

// ---------------- ドット絵 ----------------
const PIX = __PIX__;
const PXS = 4;
const pixCache = {};
function pixSprite(name, flip){
  const key=name+(flip?'_f':'');
  if(pixCache[key])return pixCache[key];
  const rows=PIX.sprites[name];
  if(!rows)throw new Error('no sprite: '+name);
  const w=rows[0].length,h=rows.length;
  if(HEADLESS){const o={c:null,w:w*PXS,h:h*PXS};pixCache[key]=o;return o;}
  const c=document.createElement('canvas');
  c.width=w*PXS;c.height=h*PXS;
  const g=c.getContext('2d');
  for(let y=0;y<h;y++){
    const row=rows[y];
    for(let x=0;x<w;x++){
      const ch=row[x];
      if(ch==='.')continue;
      const col=PIX.pal[ch];if(!col)continue;
      const px=flip?(w-1-x):x;
      g.fillStyle=col;
      g.fillRect(px*PXS,y*PXS,PXS,PXS);
    }
  }
  const o={c,w:w*PXS,h:h*PXS};
  pixCache[key]=o;return o;
}
const CHAR_SCALE={taichi:0.84,kento:0.84,nozomi:0.84,erika:1,yushi:1};
function spriteScale(name){
  for(const id in CHAR_SCALE){
    if(name.indexOf(id+'_')===0)return CHAR_SCALE[id];
  }
  return 1;
}
function drawPix(g,name,x,y,flip,alpha){
  const s=pixSprite(name,flip);
  const sc=spriteScale(name);
  if(alpha!==undefined)g.globalAlpha=alpha;
  const dw=s.w*sc,dh=s.h*sc;
  // 足元中心(x,y)を基準に、小柄なキャラは足元を保ったまま縮小
  g.drawImage(s.c,Math.round(x-dw/2),Math.round(y-dh),dw,dh);
  if(alpha!==undefined)g.globalAlpha=1;
}

// ---------------- サウンド ----------------
const AudioEng = {
  ctx:null,master:null,bgmGain:null,bgmTimer:null,muted:false,windGain:null,
  init(){
    if(HEADLESS||this.ctx)return;
    try{
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain();this.master.gain.value=0.5;this.master.connect(this.ctx.destination);
      this.bgmGain=this.ctx.createGain();this.bgmGain.gain.value=0.3;this.bgmGain.connect(this.master);
      const len=this.ctx.sampleRate*1.2;
      const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
      const d=buf.getChannelData(0);
      let last=0;
      for(let i=0;i<len;i++){last=last*0.94+(Math.random()*2-1)*0.06;d[i]=last*3;}
      const src=this.ctx.createBufferSource();
      src.buffer=buf;src.loop=true;
      this.windGain=this.ctx.createGain();this.windGain.gain.value=0;
      src.connect(this.windGain);this.windGain.connect(this.master);
      src.start();
    }catch(e){}
  },
  setWind(v){if(this.windGain)this.windGain.gain.value=Math.min(0.4,v);},
  tone(f,dur,type='square',vol=0.2,dest){
    if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(dest||this.master);o.start(t);o.stop(t+dur);
  },
  sweep(f0,f1,dur,type='square',vol=0.2){
    if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+dur);
  },
  noise(dur,vol=0.15){
    if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,n=this.ctx.createBufferSource(),
      buf=this.ctx.createBuffer(1,4410,44100),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    n.buffer=buf;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    n.connect(g);g.connect(this.master);n.start(t);n.stop(t+dur);
  },
  sfx(name){
    if(!this.ctx)return;
    switch(name){
      case 'jump':this.sweep(340,820,0.13,'square',0.14);break;
      case 'jump2':this.sweep(480,1100,0.13,'square',0.14);break;
      case 'jump3':this.sweep(620,1500,0.14,'square',0.15);this.noise(0.08,0.06);break;
      case 'dash':this.sweep(180,1500,0.24,'sawtooth',0.22);this.noise(0.2,0.14);break;
      case 'shoot':this.tone(1400,0.035,'square',0.09);this.noise(0.04,0.08);break;
      case 'shuriken':this.sweep(1800,900,0.06,'square',0.07);break;
      case 'note':this.tone(1046,0.08,'triangle',0.12);this.tone(1318,0.1,'triangle',0.08);break;
      case 'wave':this.sweep(300,900,0.14,'sawtooth',0.13);break;
      case 'bolt':this.sweep(2000,120,0.22,'sawtooth',0.2);this.noise(0.16,0.16);break;
      case 'kill':this.sweep(700,1500,0.09,'square',0.15);this.sweep(400,120,0.14,'sawtooth',0.12);this.noise(0.1,0.12);break;
      case 'hurt':this.sweep(240,70,0.3,'sawtooth',0.24);this.noise(0.25,0.2);break;
      case 'shield':this.tone(660,0.1,'triangle',0.2);this.tone(880,0.14,'triangle',0.16);break;
      case 'pick':this.tone(1240,0.05,'square',0.09);this.tone(1650,0.07,'square',0.07);break;
      case 'heart':this.sweep(500,1050,0.18,'triangle',0.2);break;
      case 'lvup':[523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.tone(f,0.15,'square',0.2),i*85));break;
      case 'cardpick':this.sweep(600,1600,0.2,'triangle',0.24);this.tone(1568,0.24,'square',0.14);break;
      case 'select':this.tone(880,0.06,'square',0.12);break;
      case 'confirm':this.sweep(660,1320,0.16,'square',0.18);break;
      case 'spring':this.sweep(300,1200,0.24,'sine',0.22);break;
      case 'boss':this.sweep(150,55,0.55,'sawtooth',0.3);break;
      case 'stun':this.sweep(900,220,0.4,'triangle',0.2);break;
      case 'tier':this.sweep(500,2000,0.3,'sawtooth',0.18);[880,1108,1318].forEach((f,i)=>setTimeout(()=>this.tone(f,0.12,'square',0.16),i*60));break;
      case 'land':this.noise(0.06,0.1);this.tone(90,0.07,'sine',0.2);break;
      case 'clear':[659,784,880,1046,1318,1568].forEach((f,i)=>setTimeout(()=>this.tone(f,0.22,'square',0.22),i*110));break;
      case 'allclear':[523,659,784,1046,784,1046,1318,1568,2093].forEach((f,i)=>setTimeout(()=>this.tone(f,0.26,'square',0.22),i*130));break;
      case 'combo':this.tone(880+Game.combo*40,0.06,'square',0.09);break;
    }
  },
  songs:{
    run:{bpm:168,
      lead:[440,0,554,659,587,0,554,440,494,0,587,740,659,587,554,494],
      bass:[110,110,110,220,98,98,98,196,123,123,123,247,110,110,131,147],
      drum:[1,0,2,0,1,0,2,0,1,0,2,0,1,2,2,2]},
    boss:{bpm:180,
      lead:[440,466,440,392,440,466,523,466,440,466,440,392,349,392,440,466],
      bass:[110,110,117,117,110,110,98,98,110,110,117,117,131,131,98,98],
      drum:[1,0,2,0,1,2,0,2,1,0,2,0,2,2,2,2]},
  },
  playBGM(name){
    if(HEADLESS)return;
    this.stopBGM();
    if(!this.ctx||!this.songs[name])return;
    const s=this.songs[name],stepDur=60/s.bpm/2;let step=0;
    this.bgmTimer=setInterval(()=>{
      if(this.muted)return;
      const i=step%s.lead.length;
      if(s.lead[i])this.tone(s.lead[i],stepDur*0.85,'sawtooth',0.05,this.bgmGain);
      if(s.bass[i])this.tone(s.bass[i],stepDur*0.95,'triangle',0.14,this.bgmGain);
      if(s.drum[i]===1)this.tone(70,0.08,'sine',0.22,this.bgmGain);
      if(s.drum[i]===2)this.noise(0.04,0.07);
      step++;
    },stepDur*1000);
  },
  stopBGM(){if(this.bgmTimer){clearInterval(this.bgmTimer);this.bgmTimer=null;}},
};

// ---------------- 入力 ----------------
const Input = {
  jump:false,dash:false,jumpPressed:false,dashPressed:false,anyPressed:false,
  _pj:false,_pd:false,_pa:false,
  raw:{jump:false,dash:false,any:false},
  tap:null, keyNum:0, keyLeft:false, keyRight:false,
  update(){
    const r=this.raw;
    this.jump=r.jump;this.dash=r.dash;
    this.jumpPressed=r.jump&&!this._pj;
    this.dashPressed=r.dash&&!this._pd;
    this.anyPressed=r.any&&!this._pa;
    this._pj=r.jump;this._pd=r.dash;this._pa=r.any;
  },
};

// ---------------- ゲーム本体 ----------------
const Game = {
  state:'title', time:0, deaths:0, totalDeaths:0, totalTime:0,
  stageIdx:0, familyLv:1, crystals:0, totalCrystals:0,
  charId:'taichi', selIdx:0, selRects:[], startRect:null,
  mods:{}, charPicks:{}, pendingPicks:0, cardOptions:[], cardSel:0, cardRects:[],
  segs:[], plats:[], enemies:[], spikes:[], springs:[], gems:[], hearts:[],
  bullets:[], projs:[], parts:[], popups:[], eshots:[], objects:[],
  player:null, camX:0, shake:0, hitStop:0, flashT:0,
  combo:0, comboT:0, bestCombo:0, kmRecord:0, trail:[],
  boss:null, bossActive:false, bossDefeated:false,
  checkpointX:0, msg:null, msgT:0, resultT:0, clearStats:null, password:'',
  titleRects:{},

  stage(){ return STAGES[this.stageIdx]; },
  char(){ return CHARS[this.charId]; },
  mod(id){ return this.mods[id]||0; },
  picksTaken(charId){
    const p=this.charPicks[charId]||{};
    return Object.values(p).reduce((a,b)=>a+b,0);
  },
  maxHearts(){ return BAL.hearts + this.mod('heart'); },
  shotCd(){ return this.char().shotCd * Math.pow(BAL.card.rapidMul, this.mod('rapid')); },
  dashCdMax(){ return BAL.dash.cd * Math.pow(BAL.card.dashCdMul, this.mod('dashcd')); },
  dashMax(){ return this.mod('dashstock') ? 2 : 1; },
  magnetR(){ return 110 + BAL.card.magnetAdd*this.mod('magnet'); },
  invulnT(){ return BAL.invulnTime + BAL.card.guardAdd*this.mod('guard'); },
  comboWin(){ return BAL.comboWindow + BAL.card.comboAdd*this.mod('combo'); },
  maxJumps(){ return this.mod('hover') ? 3 : 2; },
  speed(){
    const c=Math.min(BAL.comboSpeedCap,this.combo*BAL.speedPerCombo);
    return Math.min(BAL.maxSpeed,BAL.baseSpeed+c+BAL.card.speedAdd*this.mod('speed'));
  },
  speedKmh(){ return Math.round((this.player&&this.player.dashT>0?BAL.dash.spd:this.speed())*0.18); },

  // ---- ゲーム開始・キャラ選択 ----
  newGame(){
    this.stageIdx=0; this.familyLv=1; this.crystals=0; this.totalCrystals=0;
    this.charPicks={}; this.totalDeaths=0; this.totalTime=0;
    this.toSelect();
  },
  loadGame(data){
    this.stageIdx=data.stage; this.familyLv=data.lv; this.crystals=0;
    this.totalCrystals=0; this.charPicks={};
    this.totalDeaths=0; this.totalTime=0;
    this.toSelect();
  },
  toSelect(){
    this.state='select';
    this.selIdx=CHAR_ORDER.indexOf(this.charId);
    if(this.selIdx<0)this.selIdx=0;
    AudioEng.stopBGM(); AudioEng.setWind(0);
  },
  confirmSelect(){
    this.charId=CHAR_ORDER[this.selIdx];
    this.charPicks[this.charId]=this.charPicks[this.charId]||{};
    this.applyPicks();
    AudioEng.sfx('confirm');
    this.startStage();
  },

  applyPicks(){
    this.mods={};
    const picks=this.charPicks[this.charId]||{};
    for(const id in picks)this.mods[id]=picks[id];
  },

  startStage(){
    this.buildCourse();
    this.player={wx:80,y:BAL.GROUND_Y,vy:0,onGround:true,
      jumps:0,coyote:0,jumpBuf:0,
      hearts:this.maxHearts(),inv:0,shotT:0,burstQ:0,burstT:0,
      dashT:0,dashCd:0,dashCharges:this.dashMax(),shield:0,
      runT:0,muzzleT:0,dead:false,deadT:0,expr:'run'};
    this.camX=0;this.time=0;this.deaths=0;this.combo=0;this.comboT=0;this.bestCombo=0;this.kmRecord=0;
    this.bullets=[];this.projs=[];this.parts=[];this.popups=[];this.trail=[];
    this.eshots=[];this.objects=[];
    this.boss=null;this.bossActive=false;this.bossDefeated=false;
    this.checkpointX=80;this.msg=null;this.shake=0;this.hitStop=0;this.flashT=0;
    this.pendingPicks=Math.max(0,(this.familyLv-1)-this.picksTaken(this.charId));
    this.state='play';
    AudioEng.playBGM('run');
    this.showMsg('ステージ'+(this.stageIdx+1)+' '+this.stage().name+'!! はしれー!!',2.5);
    if(this.pendingPicks>0)this.openCards();
  },

  // ---- カード ----
  openCards(){
    const picks=this.charPicks[this.charId];
    const avail=CARDS.filter(c=>(c.char===null||c.char===this.charId)&&((picks[c.id]||0)<c.max));
    if(avail.length===0){this.pendingPicks=0;if(this.state==='card')this.state='play';return;}
    const opts=[],pool=avail.slice();
    while(opts.length<3&&pool.length>0){
      const i=Math.floor(Math.random()*pool.length);
      opts.push(pool.splice(i,1)[0]);
    }
    this.cardOptions=opts;this.cardSel=Math.min(1,opts.length-1);
    this.state='card';
  },
  pickCard(idx){
    const c=this.cardOptions[idx];
    if(!c)return;
    const picks=this.charPicks[this.charId];
    picks[c.id]=(picks[c.id]||0)+1;
    this.applyPicks();
    this.pendingPicks--;
    AudioEng.sfx('cardpick');
    const p=this.player;
    if(c.id==='heart'&&p)p.hearts=Math.min(this.maxHearts(),p.hearts+1);
    if(c.id==='dashstock'&&p)p.dashCharges=this.dashMax();
    if(p)this.popups.push({x:p.wx,y:p.y-150,txt:c.name+'!',t:1.1,col:'#ffd94d',big:true});
    if(this.pendingPicks>0){this.openCards();}
    else if(this.bossDefeated){this.finish();}
    else{this.state='play';if(p)p.inv=Math.max(p.inv,1.0);}
  },

  showMsg(t,s){this.msg=t;this.msgT=s;},

  buildCourse(){
    this.segs=[];this.plats=[];this.enemies=[];this.spikes=[];this.springs=[];
    this.gems=[];this.hearts=[];
    let x=0,segStart=0;
    const G=BAL.GROUND_Y;
    const endSeg=()=>{if(x>segStart)this.segs.push({x0:segStart,x1:x,y:G});};
    for(const [cmd,a,b] of this.stage().course){
      switch(cmd){
        case 'run':x+=a;break;
        case 'gap':endSeg();x+=a;segStart=x;break;
        case 'spikes':for(let i=0;i<a;i++)this.spikes.push({x:x+i*44,w:40});x+=a*44+20;break;
        case 'punk':for(let i=0;i<a;i++)this.enemies.push(this.mkEnemy('punk',x+i*150));x+=a*150;break;
        case 'biker':this.enemies.push(this.mkEnemy('biker',x+700));break;
        case 'bird':this.enemies.push(this.mkEnemy('bird',x+300));break;
        case 'thrower':this.enemies.push(this.mkEnemy('thrower',x+260));x+=140;break;
        case 'jumper':this.enemies.push(this.mkEnemy('jumper',x+260));x+=140;break;
        case 'turret':this.enemies.push(this.mkEnemy('turret',x+260));x+=160;break;
        case 'plat':{
          const h=b||130,y=G-h;
          this.plats.push({x0:x,x1:x+a,y});
          const n=Math.floor(a/56);
          for(let i=0;i<n;i++)this.gems.push({x:x+28+i*56,y:y-42,got:false});
          x+=a;break;}
        case 'spring':this.springs.push({x:x+20});x+=80;break;
        case 'gems':
          for(let i=0;i<a;i++)this.gems.push({x:x+i*52,y:G-60-Math.sin(i/Math.max(1,a-1)*Math.PI)*70,got:false});
          x+=a*52;break;
        case 'heart':this.hearts.push({x:x+20,y:G-60,got:false});x+=60;break;
      }
    }
    endSeg();
    this.courseEnd=x;
    this.segs.push({x0:this.courseEnd,x1:this.courseEnd+99999,y:G});
  },

  mkEnemy(kind,x){
    const G=BAL.GROUND_Y;
    const mul=1+BAL.stageHpMul*this.stageIdx;
    if(kind==='punk')return{kind,x,y:G,hp:Math.round(BAL.punk.hp*mul),w:56,h:110,vx:0,hurtT:0,t:Math.random()*7};
    if(kind==='biker')return{kind,x,y:G,hp:Math.round(BAL.biker.hp*mul),w:88,h:86,vx:-BAL.biker.spd,hurtT:0,t:0};
    if(kind==='bird')return{kind,x,y:G-180,hp:Math.round(BAL.bird.hp*mul),w:58,h:48,vx:-40,hurtT:0,t:Math.random()*7,baseY:G-180};
    if(kind==='thrower')return{kind,x,y:G,hp:Math.round(BAL.thrower.hp*mul),w:60,h:110,vx:0,hurtT:0,t:0,cd:0.8};
    if(kind==='jumper')return{kind,x,y:G,hp:Math.round(BAL.jumper.hp*mul),w:58,h:100,vx:0,vy:0,hurtT:0,t:0,cd:1.0,air:false};
    if(kind==='turret')return{kind,x,y:G,hp:Math.round(BAL.turret.hp*mul),w:70,h:96,vx:0,hurtT:0,t:0,cd:1.2};
    return null;
  },

  groundAt(wx){
    for(const s of this.segs)if(wx>=s.x0&&wx<=s.x1)return s.y;
    return null;
  },
  landingAt(wx,f0,f1){
    let best=null;
    const g=this.groundAt(wx);
    if(g!==null&&f0<=g+2&&f1>=g)best=g;
    for(const p of this.plats){
      if(wx>=p.x0&&wx<=p.x1&&f0<=p.y+2&&f1>=p.y){
        if(best===null||p.y<best)best=p.y;
      }
    }
    return best;
  },

  update(dt){
    Input.update();
    if(this.state==='title'){this.updateTitle();return;}
    if(this.state==='select'){this.updateSelect();return;}
    if(this.state==='card'){this.updateCardInput();return;}
    if(this.state==='stageclear'){
      this.resultT+=dt;
      if(this.resultT>1.4&&Input.anyPressed){
        this.stageIdx++;this.toSelect();
      }
      return;
    }
    if(this.state==='allclear'){
      this.resultT+=dt;
      if(this.resultT>2&&Input.anyPressed){this.state='title';AudioEng.stopBGM();AudioEng.setWind(0);}
      return;
    }
    if(this.hitStop>0){this.hitStop-=dt;return;}
    this.time+=dt;
    if(this.msgT>0){this.msgT-=dt;if(this.msgT<=0)this.msg=null;}
    if(this.shake>0)this.shake-=dt;
    if(this.flashT>0)this.flashT-=dt;
    // コンボは時間では切れない(被弾したときだけリセット)

    this.updatePlayer(dt);
    this.updateEnemies(dt);
    this.updateBullets(dt);
    this.updateProjs(dt);
    this.updateEShots(dt);
    this.updateObjects(dt);
    this.updateItems(dt);
    this.updateParts(dt);
    if(this.boss)this.updateBoss(dt);

    const p=this.player;
    const spdR=(this.speed()-BAL.baseSpeed)/(BAL.maxSpeed-BAL.baseSpeed);
    this.camX=p.wx-(250-spdR*60-(p.dashT>0?40:0));
    if(!this.bossActive&&!this.bossDefeated&&p.wx>this.courseEnd-400)this.spawnBoss();
    this.kmRecord=Math.max(this.kmRecord,this.speedKmh());
    AudioEng.setWind(spdR*0.28+(p.dashT>0?0.18:0));
    if(this.pendingPicks>0)this.openCards();
  },

  updateTitle(){
    if(Input.tap){
      const t=Input.tap;Input.tap=null;
      const r=this.titleRects.load;
      if(r&&t.x>=r.x&&t.x<=r.x+r.w&&t.y>=r.y&&t.y<=r.y+r.h){
        AudioEng.init();
        if(!HEADLESS)showPwInput();
        return;
      }
      AudioEng.init();this.newGame();return;
    }
    if(Input.keyNum===9){Input.keyNum=0;if(!HEADLESS)showPwInput();return;}
    if(Input.anyPressed){AudioEng.init();this.newGame();}
  },

  updateSelect(){
    if(Input.keyNum>=1&&Input.keyNum<=5){this.selIdx=Input.keyNum-1;Input.keyNum=0;AudioEng.sfx('select');}
    if(Input.keyLeft){this.selIdx=(this.selIdx+CHAR_ORDER.length-1)%CHAR_ORDER.length;Input.keyLeft=false;AudioEng.sfx('select');}
    if(Input.keyRight){this.selIdx=(this.selIdx+1)%CHAR_ORDER.length;Input.keyRight=false;AudioEng.sfx('select');}
    if(Input.tap){
      const t=Input.tap;Input.tap=null;
      for(let i=0;i<this.selRects.length;i++){
        const r=this.selRects[i];
        if(t.x>=r.x&&t.x<=r.x+r.w&&t.y>=r.y&&t.y<=r.y+r.h){
          if(this.selIdx===i){this.confirmSelect();return;}
          this.selIdx=i;AudioEng.sfx('select');return;
        }
      }
      const s=this.startRect;
      if(s&&t.x>=s.x&&t.x<=s.x+s.w&&t.y>=s.y&&t.y<=s.y+s.h){this.confirmSelect();return;}
    }
    if(Input.jumpPressed||Input.anyPressedConfirm){this.confirmSelect();}
  },

  updateCardInput(){
    if(Input.keyNum>=1&&Input.keyNum<=3){this.pickCard(Input.keyNum-1);Input.keyNum=0;return;}
    Input.keyNum=0;
    if(Input.tap){
      const t=Input.tap;Input.tap=null;
      for(let i=0;i<this.cardRects.length;i++){
        const r=this.cardRects[i];
        if(t.x>=r.x&&t.x<=r.x+r.w&&t.y>=r.y&&t.y<=r.y+r.h){this.pickCard(i);return;}
      }
    }
    if(Input.dashPressed){this.cardSel=(this.cardSel+1)%this.cardOptions.length;AudioEng.sfx('select');}
    if(Input.jumpPressed){this.pickCard(this.cardSel);}
  },

  updatePlayer(dt){
    const p=this.player,wc=this.char();
    if(p.dead){
      p.deadT+=dt;
      if(p.deadT>1.1)this.respawn();
      return;
    }
    if(p.inv>0)p.inv-=dt;
    if(p.shotT>0)p.shotT-=dt;
    if(p.muzzleT>0)p.muzzleT-=dt;
    // ダッシュ (ストック制)
    if(p.dashCharges<this.dashMax()){
      p.dashCd-=dt;
      if(p.dashCd<=0){
        p.dashCharges++;
        if(p.dashCharges<this.dashMax())p.dashCd=this.dashCdMax();
      }
    }
    if(Input.dashPressed&&p.dashCharges>0&&p.dashT<=0){
      p.dashCharges--;
      if(p.dashCd<=0)p.dashCd=this.dashCdMax();
      p.dashT=BAL.dash.time;
      AudioEng.sfx('dash');this.shake=Math.max(this.shake,0.12);this.flashT=0.1;
    }
    const dashing=p.dashT>0;
    if(dashing){
      p.dashT-=dt;
      if(p.dashT<=0&&this.mod('barrier')&&p.shield<1){
        p.shield=1;AudioEng.sfx('shield');
        this.parts.push({kind:'ring',x:p.wx,y:p.y-60,t:0.35});
      }
    }
    const spd=dashing?BAL.dash.spd:this.speed();
    p.wx+=spd*dt;
    p.runT+=spd*dt*0.022;

    this.trail.push({wx:p.wx,y:p.y,t:0.22,dash:dashing});
    if(this.trail.length>18)this.trail.shift();
    for(const tr of this.trail)tr.t-=dt;

    p.jumpBuf=Input.jumpPressed?BAL.jumpBuffer:Math.max(0,p.jumpBuf-dt);
    p.coyote=p.onGround?BAL.coyote:Math.max(0,p.coyote-dt);
    if(p.jumpBuf>0){
      if(p.coyote>0){
        p.vy=-BAL.jumpV;p.jumps=1;p.coyote=0;p.jumpBuf=0;p.onGround=false;
        AudioEng.sfx('jump');
        this.parts.push({kind:'dust',x:p.wx,y:p.y,t:0.3});
      }else if(p.jumps<this.maxJumps()){
        p.jumps++;
        p.vy=-BAL.jump2V;p.jumpBuf=0;
        AudioEng.sfx(p.jumps>=3?'jump3':'jump2');
        this.parts.push({kind:'ring',x:p.wx,y:p.y-40,t:0.3});
      }
    }
    if(!Input.jump&&p.vy<-200)p.vy=-200;

    const prevFoot=p.y,wasAir=!p.onGround;
    p.vy=Math.min(p.vy+BAL.gravity*dt,BAL.maxFall);
    // ふわふわ/ホバー (落下中にジャンプ長押しでゆっくり)
    if(!p.onGround&&Input.jump&&p.vy>0){
      if(this.mod('glide')&&p.vy>BAL.card.glideCap){p.vy=BAL.card.glideCap;
        if(Math.random()<0.25)this.parts.push({kind:'dust',x:p.wx,y:p.y,t:0.2});}
      else if(this.mod('floaty')&&p.vy>BAL.card.floatyCap)p.vy=BAL.card.floatyCap;
    }
    p.y+=p.vy*dt;
    p.onGround=false;
    if(p.vy>=0){
      const land=this.landingAt(p.wx,prevFoot,p.y);
      if(land!==null){
        p.y=land;p.vy=0;
        if(wasAir){
          this.parts.push({kind:'dust',x:p.wx,y:p.y,t:0.28});
          AudioEng.sfx('land');
          if(spd>480)this.shake=Math.max(this.shake,0.06);
        }
        p.onGround=true;p.jumps=0;
      }
    }
    if(p.y>BAL.VIEW_H+160){this.hurt(1,true);return;}

    // ---- 自動攻撃 (キャラ別) ----
    if(p.shotT<=0&&!dashing){
      if(wc.kind==='bolt'){
        const hit=this.fireBolt();
        p.shotT=hit?this.shotCd():0.12;   // 射程内に敵がいなければ待つ
      }else{
        p.shotT=this.shotCd();
        if(wc.kind==='gun'){p.burstQ=this.mod('burst')?3:1;p.burstT=0;}
        else this.fireOnce();
      }
    }
    // ゆうし: 雷とは別クールダウンで サブの魔力だんを撃つ(低威力・中距離)
    if(wc.subCd&&!dashing){
      p.subT=(p.subT||0)-dt;
      if(p.subT<=0){
        p.subT=wc.subCd*Math.pow(BAL.card.rapidMul,this.mod('rapid'));
        p.muzzleT=0.06;
        this.bullets.push({kind:'sub',x:p.wx+34,y:p.y-66,vx:wc.subSpd,vy:0,
          dmg:wc.subAtk,life:wc.subLife});
        AudioEng.sfx('note');
      }
    }
    // のぞみ: ふわふわショック中は 全方位に衝撃波を放つ
    if(this.mod('floaty')&&!p.onGround&&Input.jump&&p.vy>0){
      p.shockT=(p.shockT||0)-dt;
      if(p.shockT<=0){
        p.shockT=0.34;
        this.shockwave(p.wx,p.y-62,150,Math.round(this.char().atk*0.75));
      }
    }
    if(p.burstQ>0){
      p.burstT-=dt;
      if(p.burstT<=0){p.burstQ--;p.burstT=0.07;this.fireOnce(this.mod('burst')?0.6:1);}
    }
    // トゲ
    if(!dashing&&p.inv<=0&&p.onGround){
      for(const s of this.spikes){
        if(p.wx+16>s.x&&p.wx-16<s.x+s.w){this.hurt(1);break;}
      }
    }
    for(const s of this.springs){
      if(p.onGround&&Math.abs(p.wx-s.x-20)<32){
        p.vy=-1050;p.onGround=false;p.jumps=1;
        AudioEng.sfx('spring');
        this.parts.push({kind:'ring',x:p.wx,y:p.y,t:0.35});
      }
    }
    if(p.wx-this.checkpointX>BAL.checkpointEvery&&p.onGround&&this.groundAt(p.wx)!==null){
      this.checkpointX=p.wx;
    }
    p.expr=p.dead?'hurt':dashing?'dash':(p.inv>this.invulnT()-0.55?'hurt':(!p.onGround?'jump':'run'));
  },

  fireOnce(dmgMul=1){
    const p=this.player,wc=this.char();
    const dmg=Math.round(wc.atk*dmgMul);
    p.muzzleT=0.06;
    if(wc.kind==='gun'){
      this.bullets.push({kind:'gun',x:p.wx+44,y:p.y-62,vx:wc.spd,vy:0,dmg,life:wc.life});
      this.parts.push({kind:'shell',x:p.wx+30,y:p.y-66,vx:-120-Math.random()*80,vy:-180,t:0.5});
      AudioEng.sfx('shoot');
    }else if(wc.kind==='shuriken'){
      const angles=this.mod('multi')?[-0.32,0,0.32]:[0];
      for(const a of angles)
        this.bullets.push({kind:'shuriken',x:p.wx+36,y:p.y-58,
          vx:wc.spd*Math.cos(a),vy:wc.spd*Math.sin(a),dmg,life:wc.life,rot:0});
      AudioEng.sfx('shuriken');
    }else if(wc.kind==='note'){
      this.bullets.push({kind:'note',x:p.wx+36,y:p.y-64,vx:wc.spd,vy:0,dmg,life:wc.life,
        baseY:p.y-64,phase:0,pierce:this.mod('pierce')?3:1});
      AudioEng.sfx('note');
    }else if(wc.kind==='rod'){
      const big=this.mod('bigwave');
      // ロッドを放物線状に投げる(近〜中距離をカバー、着弾で当たり判定)
      this.bullets.push({kind:'rod',x:p.wx+34,y:p.y-70,vx:wc.spd,vy:wc.lob,
        g:1500,dmg,life:wc.life,rot:0,big,pierce:big?99:2,ww:big?46:26,tall:big?46:26});
      AudioEng.sfx('wave');
    }else if(wc.kind==='sub'){
      // ゆうしのサブ: 雷の合間を埋める低威力の魔力だん
      this.bullets.push({kind:'sub',x:p.wx+34,y:p.y-66,vx:wc.subSpd,vy:0,
        dmg:wc.subAtk,life:wc.subLife});
      AudioEng.sfx('note');
    }
  },
  shockwave(cx,cy,radius,dmg){
    // 全方位ダメージ判定 + リング演出
    this.parts.push({kind:'shock',x:cx,y:cy,t:0.32,r:radius});
    AudioEng.sfx('wave');
    for(const e of this.enemies){
      if(e.dead)continue;
      const ex=e.x,ey=e.y-e.h/2;
      if(Math.hypot(ex-cx,ey-cy)<radius+e.w/2){
        e.hp-=dmg;e.hurtT=0.12;
        this.popups.push({x:e.x,y:e.y-e.h,txt:''+dmg,t:0.4,col:'#ff8ac2'});
        if(e.hp<=0)this.killEnemy(e,false);
      }
    }
    if(this.boss){
      const b=this.boss;
      if(Math.hypot(b.x-cx,(b.y-b.h/2)-cy)<radius+b.w/2){
        const mul=b.state==='stun'?1:this.stage().boss.armor;
        const d=Math.max(1,Math.round(dmg*mul));
        b.hp-=d;b.hurtT=0.12;
        this.popups.push({x:b.x,y:b.y-b.h,txt:''+d,t:0.45,col:'#ff8ac2'});
      }
    }
    for(const o of this.objects||[]){
      if(o.dead)continue;
      if(Math.hypot(o.x-cx,o.y-cy)<radius+20){
        o.hp-=dmg;
        if(o.hp<=0)this.breakObject(o);
      }
    }
  },
  fireBolt(){
    const p=this.player,wc=this.char();
    const targets=[];
    for(const e of this.enemies)
      if(e.x>p.wx+30&&e.x<p.wx+wc.range)targets.push({x:e.x,topY:e.y-e.h,obj:e,boss:false});
    if(this.boss){
      const b=this.boss;
      if(b.x>p.wx+30&&b.x<p.wx+wc.range)targets.push({x:b.x,topY:b.y-b.h,obj:b,boss:true});
    }
    if(targets.length===0)return false;
    targets.sort((a,b)=>a.x-b.x);
    const n=this.mod('twinbolt')?2:1;
    for(let i=0;i<Math.min(n,targets.length);i++){
      const t=targets[i];
      this.parts.push({kind:'bolt',x:t.x,y:t.topY,t:0.28});
      this.parts.push({kind:'hitspark',x:t.x,y:t.topY,t:0.12});
      if(t.boss){
        const b=t.obj,mul=b.state==='stun'?1:this.stage().boss.armor;
        const d=Math.max(1,Math.round(wc.atk*mul));
        b.hp-=d;b.hurtT=0.15;
        this.popups.push({x:b.x,y:b.y-b.h,txt:''+d,t:0.5,col:b.state==='stun'?'#ffd94d':'#fff',big:b.state==='stun'});
      }else{
        const e=t.obj;
        e.hp-=wc.atk;e.hurtT=0.15;
        this.popups.push({x:e.x,y:e.y-e.h,txt:''+wc.atk,t:0.45,col:'#fff'});
        if(e.hp<=0)this.killEnemy(e,false);
      }
    }
    AudioEng.sfx('bolt');
    this.shake=Math.max(this.shake,0.08);
    return true;
  },

  hurt(dmg,fell){
    const p=this.player;
    if(p.dead||(p.inv>0&&!fell)||p.dashT>0)return;
    if(p.shield>0&&!fell){
      p.shield=0;p.inv=0.8;
      AudioEng.sfx('shield');
      this.parts.push({kind:'ring',x:p.wx,y:p.y-60,t:0.4});
      this.popups.push({x:p.wx,y:p.y-140,txt:'バリア!',t:0.7,col:'#8ad4f5'});
      return;   // コンボはまもられる!
    }
    p.hearts-=dmg;p.inv=this.invulnT();
    this.combo=0;this.comboT=0;
    AudioEng.sfx('hurt');this.shake=0.3;
    if(p.hearts<=0){p.dead=true;p.deadT=0;this.deaths++;this.totalDeaths++;return;}
    if(fell){
      const seg=this.segs.find(s=>s.x1>p.wx)||this.segs[this.segs.length-1];
      p.wx=Math.max(p.wx,seg.x0+60);p.y=seg.y-220;p.vy=0;p.jumps=1;p.inv=2;
    }
  },

  respawn(){
    const p=this.player;
    p.dead=false;p.hearts=this.maxHearts();p.inv=2;p.dashCharges=this.dashMax();
    p.wx=this.bossActive?this.courseEnd-300:this.checkpointX;
    const g=this.groundAt(p.wx);p.y=(g!==null?g:BAL.GROUND_Y)-100;p.vy=0;p.jumps=1;
    this.trail=[];
    if(this.boss){this.boss.x=p.wx+560;this.boss.state='warn';this.boss.t=this.stage().boss.warnT||0.8;this.projs=[];}
  },

  addCombo(){
    this.combo++;this.comboT=999;
    this.bestCombo=Math.max(this.bestCombo,this.combo);
    AudioEng.sfx('combo');
    if(this.combo>0&&this.combo%5===0){
      this.showMsg(this.combo+'コンボ!! かそく!!',1.0);
      AudioEng.sfx('tier');this.flashT=0.16;
      this.parts.push({kind:'burst',x:this.player.wx,y:this.player.y-60,t:0.5});
    }
    // 20コンボごとに ハートが 1こ もどる (つなぐほど ねばれる)
    if(this.combo>0&&this.combo%20===0){
      const p=this.player;
      if(p&&p.hearts<this.maxHearts()){
        p.hearts++;
        AudioEng.sfx('heart');
        this.popups.push({x:p.wx,y:p.y-140,txt:'コンボかいふく +♥',t:1.0,col:'#ff5a7a',big:true});
      }
    }
  },

  killEnemy(e,byDash){
    e.dead=true;
    this.addCombo();
    this.hitStop=byDash?0.05:0.03;
    this.shake=Math.max(this.shake,byDash?0.24:0.12);
    AudioEng.sfx('kill');
    const cfg=e.kind==='punk'?BAL.punk:e.kind==='biker'?BAL.biker:BAL.bird;
    const drop=cfg.drop+this.mod('lucky');
    for(let i=0;i<drop;i++)
      this.gems.push({x:e.x+(Math.random()-0.5)*40,y:e.y-e.h/2,got:false,
        vx:(Math.random()-0.5)*260+180,vy:-260-Math.random()*200,fly:true});
    this.parts.push({kind:'boom',x:e.x,y:e.y-e.h/2,t:0.35,big:byDash});
    for(let i=0;i<(byDash?12:7);i++)
      this.parts.push({kind:'spark',x:e.x,y:e.y-e.h/2,
        vx:(Math.random()-0.5)*520+(byDash?260:120),vy:(Math.random()-0.7)*440,t:0.4+Math.random()*0.2,
        col:['#ffd94d','#ff9a3d','#fff'][i%3]});
    this.popups.push({x:e.x,y:e.y-e.h,txt:byDash?'ズバッ!!':'ナイス!',t:0.6,col:byDash?'#ffd94d':'#fff'});
  },

  updateEnemies(dt){
    const p=this.player;
    for(const e of this.enemies){
      if(e.x<this.camX-200||e.x>this.camX+BAL.VIEW_W+900)continue;
      e.t+=dt;
      if(e.hurtT>0)e.hurtT-=dt;
      if(e.kind==='biker')e.x+=e.vx*dt;
      if(e.kind==='bird'){e.x+=e.vx*dt;e.y=e.baseY+Math.sin(e.t*3)*36;}
      // ---- 3面以降の新手 ----
      if(e.kind==='thrower'){
        // プレイヤーが射程に入ったら ビンを投げる
        const d=e.x-p.wx;
        if(d>60&&d<900){
          e.cd-=dt;
          if(e.cd<=0){
            e.cd=BAL.thrower.cd;
            const t0=0.85;
            this.projs.push({x:e.x-20,y:e.y-100,vx:(p.wx-e.x)/t0-BAL.thrower.spd*0.1,
              vy:-0.5*BAL.gravity*0.6*t0,g:BAL.gravity*0.6,t:3});
            this.popups.push({x:e.x,y:e.y-e.h-10,txt:'それっ!',t:0.5,col:'#ff8a6a'});
          }
        }
      }
      if(e.kind==='jumper'){
        // 接近すると 跳びかかってくる
        const d=e.x-p.wx;
        if(!e.air){
          e.cd-=dt;
          if(d>60&&d<520&&e.cd<=0){
            e.air=true;e.vy=BAL.jumper.jv;e.vx=-420;
            this.popups.push({x:e.x,y:e.y-e.h-10,txt:'いくぞ!',t:0.5,col:'#ffd94d'});
          }
        }else{
          e.vy+=BAL.gravity*dt;
          e.x+=e.vx*dt;e.y+=e.vy*dt;
          if(e.y>=BAL.GROUND_Y){
            e.y=BAL.GROUND_Y;e.air=false;e.vx=0;e.vy=0;e.cd=BAL.jumper.cd;
            this.parts.push({kind:'dust',x:e.x,y:e.y,t:0.3});
          }
        }
      }
      if(e.kind==='turret'){
        const d=e.x-p.wx;
        if(d>60&&d<1000){
          e.cd-=dt;
          if(e.cd<=0){
            e.cd=BAL.turret.cd;
            for(const a of [-0.28,0,0.28])
              this.eshots.push({x:e.x-24,y:e.y-70,
                vx:-BAL.turret.spd*Math.cos(a),vy:BAL.turret.spd*Math.sin(a),t:2.2});
            AudioEng.sfx('shoot');
          }
        }
      }
      const hitX=Math.abs(p.wx-e.x)<(e.w/2+18);
      const pTop=p.y-110,eTop=e.y-e.h;
      const hitY=p.y>eTop&&pTop<e.y;
      if(hitX&&hitY&&!p.dead){
        if(p.dashT>0)this.killEnemy(e,true);
        else this.hurt(1);
      }
    }
    this.enemies=this.enemies.filter(e=>!e.dead);
  },

  spawnBoss(){
    this.bossActive=true;
    const p=this.player,bc=this.stage().boss;
    this.boss={x:p.wx+620,y:BAL.GROUND_Y,w:120,h:165,
      hp:bc.hp,maxHp:bc.hp,
      state:'warn',t:0.8,pat:0,hurtT:0,runT:0,expr:'angry',dashHitDone:false};
    AudioEng.sfx('boss');AudioEng.playBGM('boss');
    this.showMsg((this.stageIdx===3?'まおう ':'ボスチンピラ ')+bc.name+'が たちふさがった!!',2.4);
    this.shake=0.5;
  },

  updateBoss(dt){
    const b=this.boss,p=this.player,bc=this.stage().boss;
    if(b.hurtT>0)b.hurtT-=dt;
    b.runT+=this.speed()*dt*0.02;
    b.t-=dt;
    // ボス戦でも コンボを つなげられるように タル/ドラムかんを ながす
    if(b.barrelT===undefined)b.barrelT=0.6;   // ボス戦かいしすぐ タルが ながれてくる
    b.barrelT-=dt;
    if(b.barrelT<=0){
      b.barrelT=bc.barrelCd;
      const n=1+(this.stageIdx>=2?1:0);
      for(let i=0;i<n;i++)
        this.spawnObject(p.wx+560+i*110+Math.random()*60,BAL.GROUND_Y-30);
    }
    const targetX=p.wx+520;
    switch(b.state){
      case 'warn':
        b.expr='angry';
        b.x+=(targetX-b.x)*Math.min(1,dt*3);
        if(b.t<=0){
          b.pat++;
          if(b.pat%bc.chargeEvery===0){b.state='charge';b.t=1.1;b.expr='rage';
            this.popups.push({x:b.x,y:b.y-b.h-20,txt:'!!',t:0.8,col:'#ff4050',big:true});
            AudioEng.sfx('boss');
          }else{b.state='throw';b.t=0.5;}
        }
        break;
      case 'throw':
        b.x+=(targetX-b.x)*Math.min(1,dt*3);
        if(b.t<=0){
          // ---- 面ごとに ちがう こうげきモーション ----
          if(bc.style==='brawler'){
            // ドスゴロ: ビンを なげる (きほん)
            const throwOne=(offset)=>{
              const dx=p.wx+offset-b.x,t0=0.9;
              this.projs.push({x:b.x-30,y:b.y-b.h+40,vx:dx/t0,vy:-0.5*BAL.gravity*0.6*t0,g:BAL.gravity*0.6,t:3});
            };
            throwOne(0);
          }else if(bc.style==='hopper'){
            // ドスジロウ: たかく とびあがって じめんを たたきつける(しょうげきは)
            b.state='hop';b.t=1.1;b.vy=-1000;b.expr='rage';
            this.popups.push({x:b.x,y:b.y-b.h-20,txt:'とぶぞ!',t:0.7,col:'#8ae86a',big:true});
            break;
          }else if(bc.style==='gunner'){
            // ドステツ: レーザーを 3ほうこうに はなつ
            for(const a of [-0.2,0,0.2])
              this.eshots.push({x:b.x-40,y:b.y-b.h+60,
                vx:-700*Math.cos(a),vy:700*Math.sin(a),t:2.4,laser:true});
            AudioEng.sfx('bolt');
            this.popups.push({x:b.x,y:b.y-b.h-16,txt:'くらえ!',t:0.6,col:'#ff6a6a'});
          }else{
            // まおう: ビン2れんなげ + ざこを よびだす
            const throwOne=(offset)=>{
              const dx=p.wx+offset-b.x,t0=0.9;
              this.projs.push({x:b.x-30,y:b.y-b.h+40,vx:dx/t0,vy:-0.5*BAL.gravity*0.6*t0,g:BAL.gravity*0.6,t:3});
            };
            throwOne(0);throwOne(170);
            if(b.pat%3===0){
              const e=this.mkEnemy('bird',b.x+120);
              e.baseY=BAL.GROUND_Y-200;e.y=e.baseY;
              this.enemies.push(e);
              this.popups.push({x:b.x,y:b.y-b.h-16,txt:'てさきを よべ!',t:0.8,col:'#c08aff'});
            }
          }
          b.state='warn';b.t=bc.throwCd;
        }
        break;
      case 'hop':
        // ドスジロウ: 空中→着地で しょうげきは
        b.vy+=BAL.gravity*0.9*dt;
        b.y+=b.vy*dt;
        b.x+=((p.wx+330)-b.x)*Math.min(1,dt*2.5);
        if(b.y>=BAL.GROUND_Y){
          b.y=BAL.GROUND_Y;b.vy=0;
          this.shake=0.4;AudioEng.sfx('boss');
          this.parts.push({kind:'shock',x:b.x,y:b.y-20,t:0.32,r:210});
          // 着地しょうげきは: 地上にいると ダメージ
          if(!p.dead&&p.onGround&&p.dashT<=0&&Math.abs(p.wx-b.x)<260)this.hurt(1);
          // タルが ふりおちる(コンボの タネ)
          for(let i=0;i<2;i++)this.spawnObject(b.x-160-i*90,BAL.GROUND_Y-30);
          b.state='warn';b.t=bc.throwCd;
        }
        break;
      case 'charge':
        b.expr='rage';
        b.x-=bc.chargeSpd*dt;
        this.parts.push({kind:'bossafter',x:b.x,y:b.y,t:0.2,spr:bc.sprite,legs:Math.floor(b.runT*2)%2});
        if(!p.dead&&Math.abs(b.x-p.wx)<70&&p.y>b.y-b.h+20){
          if(p.dashT>0){}else this.hurt(1);
        }
        if(b.x<p.wx-60||b.t<=0){
          b.state='stun';b.t=bc.stunT;b.expr='dizzy';
          AudioEng.sfx('stun');this.shake=0.3;
          this.popups.push({x:b.x,y:b.y-b.h-16,txt:'いまだ!!',t:1.2,col:'#ffd94d',big:true});
        }
        break;
      case 'stun':
        b.expr='dizzy';
        // よろけながら前方210pxに滑り込む → 全キャラのこうげきが届く!
        b.x+=((p.wx+210)-b.x)*Math.min(1,dt*5);
        if(b.t<=0){b.state='warn';b.t=0.8;b.x=p.wx+520;}
        break;
    }
    if(b.hp<=0)this.defeatBoss();
  },

  defeatBoss(){
    const b=this.boss;
    for(let i=0;i<30;i++)
      this.gems.push({x:b.x,y:b.y-70,got:false,vx:(Math.random()-0.5)*500,vy:-300-Math.random()*280,fly:true});
    this.parts.push({kind:'boom',x:b.x,y:b.y-b.h/2,t:0.9,big:true});
    for(let i=0;i<20;i++)
      this.parts.push({kind:'spark',x:b.x,y:b.y-b.h/2,vx:(Math.random()-0.5)*700,vy:(Math.random()-0.8)*600,t:0.5+Math.random()*0.3,col:['#ffd94d','#ff9a3d','#fff'][i%3]});
    this.boss=null;this.bossActive=false;this.bossDefeated=true;
    this.shake=0.7;this.hitStop=0.1;this.flashT=0.3;
    AudioEng.stopBGM();AudioEng.sfx(this.stageIdx===3?'allclear':'clear');
    this.showMsg(this.stage().boss.name+'を ぶっとばした!!',2.4);
    if(HEADLESS)this.finish();
    else setTimeout(()=>{if(this.state==='play')this.finish();},2500);
  },

  finish(){
    this.totalTime+=this.time;
    this.clearStats={time:this.time,deaths:this.deaths,crystals:this.totalCrystals,
      lv:this.familyLv,combo:this.bestCombo,kmh:this.kmRecord,
      picks:Object.assign({},this.charPicks[this.charId])};
    AudioEng.stopBGM();AudioEng.setWind(0);
    if(this.stageIdx>=STAGES.length-1){
      this.state='allclear';this.resultT=0;
    }else{
      this.password=Password.encode({stage:this.stageIdx+1,lv:this.familyLv});
      this.state='stageclear';this.resultT=0;
    }
  },

  updateBullets(dt){
    for(const a of this.bullets){
      a.x+=a.vx*dt;a.life-=dt;
      if(a.kind==='shuriken'){a.y+=a.vy*dt;a.rot+=dt*20;}
      if(a.kind==='note'){a.phase+=dt*9;a.y=a.baseY+Math.sin(a.phase)*24;}
      if(a.kind==='rod'){
        // 放物線: 重力で おちる → 地面で ばくはつ(メガファンサ時は はんいダメージ)
        a.vy+=a.g*dt;a.y+=a.vy*dt;a.rot+=dt*16;
        if(a.y>=BAL.GROUND_Y-10){
          a.life=0;
          if(a.big){
            this.shockwave(a.x,BAL.GROUND_Y-24,110,a.dmg);
          }else{
            this.parts.push({kind:'boom',x:a.x,y:BAL.GROUND_Y-16,t:0.24});
          }
        }
      }
      const halfH=a.tall?a.tall/2:12;
      for(const e of this.enemies){
        if(a.life<=0)break;
        if(a.hitSet&&a.hitSet.has(e))continue;
        const eMid=e.y-e.h/2;
        if(Math.abs(a.x-e.x)<e.w/2+(a.ww?a.ww/2:8)&&Math.abs(a.y-eMid)<e.h/2+halfH){
          e.hp-=a.dmg;e.hurtT=0.12;
          this.popups.push({x:e.x,y:e.y-e.h,txt:''+a.dmg,t:0.45,col:'#fff'});
          this.parts.push({kind:'hitspark',x:a.x,y:a.y,t:0.12});
          if(e.hp<=0)this.killEnemy(e,false);
          if(a.pierce&&a.pierce>1){a.pierce--;(a.hitSet=a.hitSet||new Set()).add(e);}
          else a.life=0;
        }
      }
      if(this.boss&&a.life>0){
        const b=this.boss,bMid=b.y-b.h/2;
        if(Math.abs(a.x-b.x)<b.w/2+(a.ww?a.ww/2:10)&&Math.abs(a.y-bMid)<b.h/2+halfH){
          a.life=0;
          const mul=b.state==='stun'?1:this.stage().boss.armor;
          const d=Math.max(1,Math.round(a.dmg*mul));
          b.hp-=d;b.hurtT=0.12;
          this.parts.push({kind:'hitspark',x:a.x,y:a.y,t:0.12});
          this.popups.push({x:b.x,y:b.y-b.h,txt:''+d,t:0.5,col:b.state==='stun'?'#ffd94d':'#fff',big:b.state==='stun'});
        }
      }
    }
    if(this.boss&&this.player.dashT>0){
      const b=this.boss,p=this.player;
      if(Math.abs(b.x-p.wx)<70&&!b.dashHitDone){
        const mul=b.state==='stun'?1:this.stage().boss.armor;
        const d=Math.round(BAL.dash.dmg*mul);
        b.hp-=d;b.hurtT=0.15;b.dashHitDone=true;
        this.hitStop=0.06;this.shake=0.3;
        this.popups.push({x:b.x,y:b.y-b.h-10,txt:d+'!!',t:0.7,col:'#ffd94d',big:true});
      }
    }
    if(this.player.dashT<=0&&this.boss)this.boss.dashHitDone=false;
    this.bullets=this.bullets.filter(a=>a.life>0);
  },

  updateProjs(dt){
    const p=this.player;
    for(const pr of this.projs){
      pr.t-=dt;pr.vy+=pr.g*dt;pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
      if(pr.y>=BAL.GROUND_Y-6){
        pr.t=0;
        this.parts.push({kind:'boom',x:pr.x,y:BAL.GROUND_Y-10,t:0.3});
        if(!p.dead&&Math.abs(pr.x-p.wx)<54&&p.y>BAL.GROUND_Y-70)this.hurt(1);
      }else if(!p.dead&&p.dashT<=0&&Math.abs(pr.x-p.wx)<34&&Math.abs(pr.y-(p.y-60))<56){
        pr.t=0;this.hurt(1);
      }
    }
    this.projs=this.projs.filter(pr=>pr.t>0);
  },

  updateEShots(dt){
    const p=this.player;
    for(const s of this.eshots){
      s.t-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;
      if(!p.dead&&p.dashT<=0&&Math.abs(s.x-p.wx)<30&&Math.abs(s.y-(p.y-60))<56){
        s.t=0;this.hurt(1);
      }
      if(s.y>BAL.GROUND_Y-4){
        s.t=0;this.parts.push({kind:'hitspark',x:s.x,y:BAL.GROUND_Y-8,t:0.12});
      }
    }
    this.eshots=this.eshots.filter(s=>s.t>0);
  },

  // ボス戦の コンボかせぎ: こわせるオブジェクト(タル/ドラムかん)
  spawnObject(x,y){
    this.objects.push({x,y,hp:1,dead:false,t:0});
  },
  breakObject(o){
    if(o.dead)return;
    o.dead=true;
    this.addCombo();                 // ← ボス戦でも コンボが つながる!
    AudioEng.sfx('kill');
    this.hitStop=0.03;
    this.shake=Math.max(this.shake,0.1);
    this.parts.push({kind:'boom',x:o.x,y:o.y,t:0.3});
    for(let i=0;i<7;i++)
      this.parts.push({kind:'spark',x:o.x,y:o.y,
        vx:(Math.random()-0.5)*460,vy:(Math.random()-0.7)*420,t:0.35+Math.random()*0.2,
        col:['#ffd94d','#ff9a3d','#fff'][i%3]});
    const drop=2+this.mod('lucky');
    for(let i=0;i<drop;i++)
      this.gems.push({x:o.x+(Math.random()-0.5)*30,y:o.y,got:false,
        vx:(Math.random()-0.5)*240+140,vy:-240-Math.random()*180,fly:true});
    this.popups.push({x:o.x,y:o.y-30,txt:'ドカン!',t:0.5,col:'#ffd94d'});
  },
  updateObjects(dt){
    const p=this.player;
    for(const o of this.objects){
      if(o.dead)continue;
      o.t+=dt;
      // ダッシュで こわせる
      if(p.dashT>0&&Math.abs(o.x-p.wx)<44&&Math.abs(o.y-(p.y-50))<70)this.breakObject(o);
      // 弾でも こわせる
      for(const a of this.bullets){
        if(a.life<=0)continue;
        if(Math.abs(a.x-o.x)<28&&Math.abs(a.y-o.y)<34){
          if(!a.pierce||a.pierce<=1)a.life=0;
          else a.pierce--;
          this.breakObject(o);break;
        }
      }
    }
    this.objects=this.objects.filter(o=>!o.dead&&o.x>this.camX-200);
  },

  updateItems(dt){
    const p=this.player;
    const mr=this.magnetR();
    for(const g of this.gems){
      if(g.got)continue;
      if(g.fly){
        g.vy+=BAL.gravity*0.7*dt;g.x+=g.vx*dt;g.y+=g.vy*dt;
        const gr=this.groundAt(g.x);
        if(gr!==null&&g.y>gr-10){g.y=gr-10;g.vy*=-0.3;g.vx*=0.75;if(Math.abs(g.vy)<50)g.fly=false;}
        if(g.y>BAL.VIEW_H+100){g.got=true;continue;}
      }
      const dx=p.wx-g.x,dy=(p.y-55)-g.y,d=Math.hypot(dx,dy);
      if(d<mr){g.x+=dx/d*600*dt;g.y+=dy/d*600*dt;}
      if(d<36){g.got=true;this.gainCrystal(1);}
    }
    this.gems=this.gems.filter(g=>!g.got||g.x>this.camX-100);
    for(const h of this.hearts){
      if(h.got)continue;
      if(Math.abs(p.wx-h.x)<40&&Math.abs((p.y-55)-h.y)<60){
        h.got=true;p.hearts=Math.min(this.maxHearts(),p.hearts+1);
        AudioEng.sfx('heart');
        this.popups.push({x:p.wx,y:p.y-130,txt:'+♥',t:0.7,col:'#ff5a7a'});
      }
    }
  },

  gainCrystal(v){
    this.crystals+=v;this.totalCrystals+=v;
    AudioEng.sfx('pick');
    while(this.familyLv<BAL.lvMax&&this.crystals>=BAL.lvNeed(this.familyLv)){
      this.crystals-=BAL.lvNeed(this.familyLv);
      this.familyLv++;
      this.pendingPicks++;
      AudioEng.sfx('lvup');
      const p=this.player;if(p)p.hearts=Math.min(this.maxHearts(),p.hearts+1);
      if(p)this.parts.push({kind:'lvup',x:p.wx,y:p.y-60,t:1});
    }
  },

  updateParts(dt){
    for(const pt of this.parts){
      pt.t-=dt;
      if(pt.kind==='spark'||pt.kind==='shell'){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=1400*dt;}
    }
    this.parts=this.parts.filter(p=>p.t>0);
    for(const pp of this.popups){pp.t-=dt;pp.y-=50*dt;}
    this.popups=this.popups.filter(p=>p.t>0);
  },
};
Input.anyPressedConfirm=false;

/* ================= 描画 ================= */
let cv,ctx;
function rr(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}

function heroSprite(p,charId){
  let leg;
  if(p.expr==='jump'||p.expr==='hurt')leg='jump';
  else if(p.expr==='dash')leg='run2';
  else{const f=Math.floor(p.runT)%4;leg=['run0','run1','run2','run1'][f];}
  return charId+'_'+p.expr+'_'+leg;
}
function bossSpriteName(b,spr){
  const legs=(b.state==='stun')?'walk0':'walk'+(Math.floor(b.runT*2)%2);
  return spr+'_'+b.expr+'_'+legs;
}

function drawBG(theme,camX){
  const W=BAL.VIEW_W,H=BAL.VIEW_H;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,theme.sky[0]);sky.addColorStop(0.45,theme.sky[1]);sky.addColorStop(0.85,theme.sky[2]);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=theme.sun;ctx.beginPath();ctx.arc(W*0.72,150,55,0,7);ctx.fill();
  ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(W*0.72,150,80,0,7);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.28)';
  for(let i=0;i<5;i++){
    const cx2=((i*530+120)-camX*0.55)%(W+700)-350;
    ctx.fillRect(cx2,60+i*42,150,10);
  }
  drawLayer(0.15,theme.bld[0],260,0);
  drawLayer(0.35,theme.bld[1],180,500);
  function drawLayer(fac,col,hmax,seedoff){
    ctx.fillStyle=col;
    const bw=110;
    const start=Math.floor(camX*fac/bw);
    for(let i=start;i<start+11;i++){
      const hgt=80+((i*7919+seedoff)%hmax);
      const bx=i*bw-camX*fac;
      if(theme.type==='forest'){
        // 三角の木
        ctx.beginPath();
        ctx.moveTo(bx+bw/2-7,BAL.GROUND_Y-hgt);
        ctx.lineTo(bx+bw-10,BAL.GROUND_Y+20);
        ctx.lineTo(bx-4,BAL.GROUND_Y+20);
        ctx.closePath();ctx.fill();
      }else if(theme.type==='castle'){
        ctx.fillRect(bx,BAL.GROUND_Y-hgt,bw-14,hgt+20);
        for(let tx=0;tx<bw-14;tx+=24)ctx.fillRect(bx+tx,BAL.GROUND_Y-hgt-14,14,14);
        ctx.fillStyle='rgba(255,120,80,0.5)';
        for(let wy=0;wy<hgt-40;wy+=48)
          if(((i*31+wy)%97)<40)ctx.fillRect(bx+bw/2-8,BAL.GROUND_Y-hgt+20+wy,10,16);
        ctx.fillStyle=col;
      }else{
        ctx.fillRect(bx,BAL.GROUND_Y-hgt,bw-14,hgt+20);
        if(theme.type==='factory'&&i%3===0){
          ctx.fillRect(bx+bw/2,BAL.GROUND_Y-hgt-46,20,46);
          ctx.fillStyle='rgba(200,200,210,0.25)';
          ctx.beginPath();ctx.arc(bx+bw/2+10,BAL.GROUND_Y-hgt-60,16+((Date.now()/60+i*40)%40)*0.4,0,7);ctx.fill();
          ctx.fillStyle=col;
        }
        ctx.fillStyle='rgba(255,220,130,0.45)';
        for(let wy=0;wy<hgt-30;wy+=34)for(let wxx=12;wxx<bw-30;wxx+=28)
          if(((i*31+wy+wxx)%97)<45)ctx.fillRect(bx+wxx,BAL.GROUND_Y-hgt+14+wy,12,16);
        ctx.fillStyle=col;
      }
    }
  }
}

function draw(){
  const W=BAL.VIEW_W,H=BAL.VIEW_H,G=Game;
  if(G.state==='title'){drawTitle();return;}
  if(G.state==='select'){drawSelect();return;}
  if(G.state==='stageclear'){drawStageClear();return;}
  if(G.state==='allclear'){drawAllClear();return;}
  const p=G.player,theme=G.stage();
  const spdR=(G.speed()-BAL.baseSpeed)/(BAL.maxSpeed-BAL.baseSpeed);
  const shX=G.shake>0?(Math.random()-0.5)*12*G.shake*3:0;
  const shY=G.shake>0?(Math.random()-0.5)*9*G.shake*3:0;

  drawBG(theme,G.camX);

  const zoom=1-0.05*spdR-(p.dashT>0?0.02:0);
  ctx.save();
  ctx.translate(W/2,H*0.62);ctx.scale(zoom,zoom);ctx.translate(-W/2,-H*0.62);
  ctx.translate(-Math.round(G.camX)+shX,shY);

  for(const s of G.segs){
    if(s.x1<G.camX-80||s.x0>G.camX+W+200)continue;
    const x0=Math.max(s.x0,G.camX-80),x1=Math.min(s.x1,G.camX+W+200);
    ctx.fillStyle=theme.road;ctx.fillRect(x0,s.y,x1-x0,H-s.y+80);
    ctx.fillStyle=theme.roadTop;ctx.fillRect(x0,s.y,x1-x0,10);
    ctx.fillStyle=theme.line;
    for(let lx=Math.floor(x0/90)*90;lx<x1;lx+=90)
      if(lx>=s.x0&&lx+46<=s.x1)ctx.fillRect(lx,s.y+34,46,7);
  }
  for(const pl of G.plats){
    if(pl.x1<G.camX||pl.x0>G.camX+W+100)continue;
    ctx.fillStyle='#7a5a3a';rr(ctx,pl.x0,pl.y,pl.x1-pl.x0,20,8);ctx.fill();
    ctx.fillStyle='#9a7a52';rr(ctx,pl.x0,pl.y,pl.x1-pl.x0,8,6);ctx.fill();
  }
  ctx.fillStyle='#c0c8d4';
  for(const s of G.spikes){
    if(s.x<G.camX-60||s.x>G.camX+W+160)continue;
    ctx.beginPath();
    ctx.moveTo(s.x,BAL.GROUND_Y);ctx.lineTo(s.x+s.w/2,BAL.GROUND_Y-30);ctx.lineTo(s.x+s.w,BAL.GROUND_Y);
    ctx.fill();
    ctx.fillStyle='#8a94a4';
    ctx.beginPath();
    ctx.moveTo(s.x+8,BAL.GROUND_Y);ctx.lineTo(s.x+s.w/2,BAL.GROUND_Y-22);ctx.lineTo(s.x+s.w-8,BAL.GROUND_Y);
    ctx.fill();
    ctx.fillStyle='#c0c8d4';
  }
  for(const s of G.springs){
    if(s.x<G.camX-60||s.x>G.camX+W+160)continue;
    ctx.fillStyle='#e23b3b';rr(ctx,s.x,BAL.GROUND_Y-14,44,14,4);ctx.fill();
    ctx.strokeStyle='#f0d060';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(s.x+6,BAL.GROUND_Y-14);ctx.lineTo(s.x+12,BAL.GROUND_Y-4);
    ctx.lineTo(s.x+20,BAL.GROUND_Y-14);ctx.lineTo(s.x+27,BAL.GROUND_Y-4);
    ctx.lineTo(s.x+34,BAL.GROUND_Y-14);ctx.stroke();
  }
  for(const gm of G.gems){
    if(gm.got||gm.x<G.camX-60||gm.x>G.camX+W+160)continue;
    const tw=Math.sin(Date.now()/140+gm.x)*3;
    ctx.fillStyle='#6de0ff';
    ctx.beginPath();ctx.moveTo(gm.x,gm.y-12+tw);ctx.lineTo(gm.x+9,gm.y+tw);
    ctx.lineTo(gm.x,gm.y+12+tw);ctx.lineTo(gm.x-9,gm.y+tw);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fillRect(gm.x-3,gm.y-7+tw,4,5);
  }
  for(const h of G.hearts){
    if(h.got)continue;
    ctx.fillStyle='#ff5a7a';ctx.font='34px monospace';ctx.textAlign='center';
    ctx.fillText('♥',h.x,h.y+Math.sin(Date.now()/200)*4);
  }
  // 弾 (キャラ別)
  for(const a of G.bullets){
    if(a.kind==='gun'){
      ctx.strokeStyle='rgba(255,230,120,0.5)';ctx.lineWidth=6;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(a.x-46,a.y);ctx.lineTo(a.x,a.y);ctx.stroke();
      ctx.fillStyle='#fff6d0';rr(ctx,a.x-6,a.y-3,14,6,3);ctx.fill();
    }else if(a.kind==='shuriken'){
      ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
      ctx.fillStyle='#c8d2e0';
      for(let i=0;i<4;i++){ctx.rotate(Math.PI/2);
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(12,-4);ctx.lineTo(12,4);ctx.fill();}
      ctx.fillStyle='#5a6474';ctx.beginPath();ctx.arc(0,0,3.5,0,7);ctx.fill();
      ctx.restore();
    }else if(a.kind==='note'){
      ctx.fillStyle='#ff8ac2';
      ctx.beginPath();ctx.ellipse(a.x,a.y+4,8,6,-0.4,0,7);ctx.fill();
      ctx.strokeStyle='#ff8ac2';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(a.x+7,a.y+2);ctx.lineTo(a.x+7,a.y-16);ctx.stroke();
      ctx.strokeStyle='rgba(255,138,194,0.4)';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(a.x-30,a.y);ctx.lineTo(a.x-8,a.y);ctx.stroke();
    }else if(a.kind==='rod'){
      // ファンサ☆ロッド: くるくる回りながら 放物線で とんでいく
      ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
      const L=a.big?34:24;
      ctx.strokeStyle='#ff8ac2';ctx.lineWidth=a.big?10:7;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-L,0);ctx.lineTo(L,0);ctx.stroke();
      ctx.fillStyle='#ffd94d';
      ctx.beginPath();ctx.arc(L,0,a.big?11:8,0,7);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=(a.big?'18px':'14px')+" monospace";ctx.textAlign='center';
      ctx.fillText('☆',L,4);
      ctx.restore();
      ctx.strokeStyle='rgba(255,138,194,0.28)';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(a.x-a.vx*0.05,a.y-a.vy*0.05);ctx.lineTo(a.x,a.y);ctx.stroke();
    }else if(a.kind==='sub'){
      // ゆうしの サブ: ちいさな まりょくだん
      ctx.fillStyle='rgba(150,190,255,0.35)';
      ctx.beginPath();ctx.arc(a.x,a.y,11,0,7);ctx.fill();
      ctx.fillStyle='#9ad0ff';
      ctx.beginPath();ctx.arc(a.x,a.y,6,0,7);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(a.x+1,a.y-1,2.5,0,7);ctx.fill();
    }
  }
  for(const pr of G.projs){
    ctx.save();ctx.translate(pr.x,pr.y);ctx.rotate(Date.now()/80);
    ctx.fillStyle='#7ab86a';rr(ctx,-6,-14,12,24,5);ctx.fill();
    ctx.fillStyle='#4a8a3a';ctx.fillRect(-3,-20,6,8);
    ctx.restore();
    ctx.strokeStyle='rgba(255,80,80,0.7)';ctx.lineWidth=3;
    const lx=pr.x+pr.vx*((BAL.GROUND_Y-pr.y)/Math.max(1,pr.vy+200))*0.8;
    ctx.beginPath();ctx.ellipse(Math.min(Math.max(lx,pr.x-300),pr.x+600),BAL.GROUND_Y-4,26,7,0,0,7);ctx.stroke();
  }
  for(const e of G.enemies){
    if(e.x<G.camX-160||e.x>G.camX+W+460)continue;
    const a=e.hurtT>0?0.55:1;
    if(e.kind==='punk')drawPix(ctx,'punk_walk'+(Math.floor(e.t*5)%2),e.x,e.y,false,a);
    else if(e.kind==='biker')drawPix(ctx,'biker_ride',e.x,e.y+Math.sin(e.t*18)*2,true,a);
    else if(e.kind==='bird')drawPix(ctx,'bird_fly'+(Math.floor(e.t*8)%2),e.x,e.y+24,false,a);
    else if(e.kind==='thrower'){
      drawPix(ctx,'punk_walk'+(Math.floor(e.t*3)%2),e.x,e.y,false,a);
      // 手にビン + 予告マーク
      ctx.fillStyle='#7ab86a';rr(ctx,e.x-34,e.y-104,12,20,4);ctx.fill();
      if(e.cd<0.5){
        ctx.fillStyle='#ff6a6a';ctx.font="22px 'DotGothic16',monospace";ctx.textAlign='center';
        ctx.fillText('!',e.x,e.y-e.h-14);
      }
    }
    else if(e.kind==='jumper'){
      drawPix(ctx,'punk_walk'+(e.air?1:Math.floor(e.t*6)%2),e.x,e.y,false,a);
      ctx.strokeStyle='rgba(255,217,77,0.9)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(e.x,e.y-e.h-16,7,0,7);ctx.stroke();
      if(!e.air&&e.cd<0.5){
        ctx.fillStyle='#ffd94d';ctx.font="20px 'DotGothic16',monospace";ctx.textAlign='center';
        ctx.fillText('▲',e.x,e.y-e.h-26);
      }
    }
    else if(e.kind==='turret'){
      // ドラムかん砲台
      ctx.fillStyle='#6a6a78';rr(ctx,e.x-30,e.y-84,60,84,8);ctx.fill();
      ctx.fillStyle='#8a8a9a';rr(ctx,e.x-30,e.y-84,60,12,6);ctx.fill();
      ctx.fillStyle='#c93a30';ctx.fillRect(e.x-30,e.y-52,60,10);
      ctx.fillStyle='#3a3a44';ctx.fillRect(e.x-52,e.y-70,26,14);
      if(e.cd<0.5){
        ctx.fillStyle='#ff6a6a';ctx.beginPath();ctx.arc(e.x-52,e.y-63,7,0,7);ctx.fill();
      }
      if(e.hurtT>0){ctx.globalAlpha=0.4;ctx.fillStyle='#fff';
        rr(ctx,e.x-30,e.y-84,60,84,8);ctx.fill();ctx.globalAlpha=1;}
    }
  }
  // こわせるタル (ボス戦の コンボかせぎ)
  for(const o of G.objects){
    if(o.dead||o.x<G.camX-100||o.x>G.camX+W+300)continue;
    ctx.fillStyle='#8a5a32';rr(ctx,o.x-20,o.y-30,40,44,6);ctx.fill();
    ctx.fillStyle='#a87a4a';rr(ctx,o.x-20,o.y-30,40,8,4);ctx.fill();
    ctx.fillStyle='#5a3a20';ctx.fillRect(o.x-20,o.y-14,40,5);
    ctx.fillStyle='#ffd94d';ctx.font="15px 'DotGothic16',monospace";ctx.textAlign='center';
    ctx.fillText('★',o.x,o.y-2);
  }
  // 敵の弾(レーザー/たま)
  for(const s of G.eshots){
    if(s.laser){
      ctx.strokeStyle='rgba(255,90,90,0.9)';ctx.lineWidth=6;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(s.x+30,s.y-s.vy*0.04);ctx.lineTo(s.x,s.y);ctx.stroke();
      ctx.strokeStyle='rgba(255,220,220,0.9)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(s.x+30,s.y-s.vy*0.04);ctx.lineTo(s.x,s.y);ctx.stroke();
    }else{
      ctx.fillStyle='#ff7a5a';ctx.beginPath();ctx.arc(s.x,s.y,7,0,7);ctx.fill();
      ctx.fillStyle='#ffd0c0';ctx.beginPath();ctx.arc(s.x+2,s.y-2,3,0,7);ctx.fill();
    }
  }
  if(G.boss){
    const b=G.boss;
    drawPix(ctx,bossSpriteName(b,G.stage().boss.sprite),b.x,b.y,true,b.hurtT>0?0.55:1);
  }
  for(let i=0;i<G.trail.length;i+=3){
    const tr=G.trail[i];
    if(tr.t<=0)continue;
    if(!tr.dash&&spdR<0.5)continue;
    drawPix(ctx,G.charId+'_'+(tr.dash?'dash':'run')+'_run2',tr.wx,tr.y,false,
      (tr.dash?0.30:0.12)*(tr.t/0.22));
  }
  if(!p.dead&&(p.inv<=0||Math.floor(p.inv*12)%2===0)){
    drawPix(ctx,heroSprite(p,G.charId),p.wx,p.y,false);
    if(p.muzzleT>0&&G.char().kind==='gun'){
      ctx.fillStyle='#ffde7a';
      ctx.beginPath();
      const mx=p.wx+52,my=p.y-62;
      ctx.moveTo(mx,my-9);ctx.lineTo(mx+18,my);ctx.lineTo(mx,my+9);ctx.lineTo(mx+7,my);ctx.fill();
    }
    if(p.shield>0){
      ctx.strokeStyle='rgba(138,212,245,'+(0.5+Math.sin(Date.now()/150)*0.2)+')';ctx.lineWidth=4;
      ctx.beginPath();ctx.ellipse(p.wx,p.y-62,46,72,0,0,7);ctx.stroke();
    }
  }
  for(const pt of G.parts){
    if(pt.kind==='dust'){
      ctx.fillStyle='rgba(220,220,230,'+pt.t*2+')';
      ctx.beginPath();ctx.arc(pt.x-10,pt.y-4,(0.3-pt.t)*40+6,0,7);ctx.fill();
    }else if(pt.kind==='ring'){
      ctx.strokeStyle='rgba(255,255,255,'+Math.min(1,pt.t*2.4)+')';ctx.lineWidth=4;
      ctx.beginPath();ctx.ellipse(pt.x,pt.y+30,(0.35-Math.min(pt.t,0.35))*90+10,(0.35-Math.min(pt.t,0.35))*26+4,0,0,7);ctx.stroke();
    }else if(pt.kind==='boom'){
      const r=(0.35-Math.min(pt.t,0.35))*(pt.big?260:140)+12;
      ctx.fillStyle='rgba(255,190,70,'+pt.t*2+')';
      ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,7);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,'+pt.t*1.6+')';
      ctx.beginPath();ctx.arc(pt.x,pt.y,r*0.5,0,7);ctx.fill();
    }else if(pt.kind==='spark'){
      ctx.fillStyle=pt.col||'#ffd94d';
      ctx.globalAlpha=Math.min(1,pt.t*3);
      ctx.fillRect(pt.x-3,pt.y-3,6,6);
      ctx.globalAlpha=1;
    }else if(pt.kind==='shell'){
      ctx.fillStyle='rgba(230,190,90,'+Math.min(1,pt.t*3)+')';
      ctx.fillRect(pt.x-2,pt.y-3,5,7);
    }else if(pt.kind==='hitspark'){
      ctx.strokeStyle='rgba(255,255,255,'+pt.t*8+')';ctx.lineWidth=3;
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2+0.6;
        ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.lineTo(pt.x+Math.cos(a)*16,pt.y+Math.sin(a)*16);ctx.stroke();
      }
    }else if(pt.kind==='shock'){
      const prog=1-Math.min(pt.t,0.32)/0.32;
      const r=(pt.r||150)*prog;
      ctx.strokeStyle='rgba(255,138,194,'+(1-prog)+')';ctx.lineWidth=9;
      ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,7);ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,'+(1-prog)*0.9+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(pt.x,pt.y,r*0.82,0,7);ctx.stroke();
    }else if(pt.kind==='burst'){
      ctx.strokeStyle='rgba(255,217,77,'+pt.t*2+')';ctx.lineWidth=8;
      ctx.beginPath();ctx.arc(pt.x,pt.y,(0.5-pt.t)*300+20,0,7);ctx.stroke();
    }else if(pt.kind==='bossafter'){
      drawPix(ctx,pt.spr+'_rage_walk'+(pt.legs||0),pt.x,pt.y,true,pt.t*1.6);
    }else if(pt.kind==='bolt'){
      // 落雷: 空からジグザグ
      ctx.strokeStyle='rgba(255,240,140,'+Math.min(1,pt.t*5)+')';ctx.lineWidth=7;
      ctx.beginPath();
      let by=0;
      ctx.moveTo(pt.x+18,by);
      while(by<pt.y-10){by+=44;ctx.lineTo(pt.x+((by/44)%2===0?16:-14),Math.min(by,pt.y));}
      ctx.lineTo(pt.x,pt.y);ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,'+Math.min(1,pt.t*4)+')';ctx.lineWidth=3;ctx.stroke();
      ctx.fillStyle='rgba(255,240,160,'+pt.t*2+')';
      ctx.beginPath();ctx.arc(pt.x,pt.y,(0.28-Math.min(pt.t,0.28))*120+8,0,7);ctx.fill();
    }else if(pt.kind==='lvup'){
      ctx.strokeStyle='rgba(255,230,120,'+pt.t+')';ctx.lineWidth=6;
      ctx.beginPath();ctx.arc(pt.x,pt.y,(1-pt.t)*160+10,0,7);ctx.stroke();
    }
  }
  ctx.textAlign='center';
  for(const pp of G.popups){
    ctx.font=(pp.big?'34px':'24px')+" 'DotGothic16',monospace";
    ctx.strokeStyle='rgba(30,10,40,0.7)';ctx.lineWidth=5;
    ctx.fillStyle=pp.col;
    ctx.strokeText(pp.txt,pp.x,pp.y);ctx.fillText(pp.txt,pp.x,pp.y);
  }
  ctx.restore();

  if(spdR>0.2||p.dashT>0){
    const n=p.dashT>0?18:Math.floor(spdR*10);
    ctx.strokeStyle='rgba(255,255,255,'+(p.dashT>0?0.55:spdR*0.35)+')';
    ctx.lineWidth=3;
    for(let i=0;i<n;i++){
      const ly=(i*97+Date.now()*0.8)%H;
      const len=60+((i*53)%160)+spdR*100;
      const lx=W-((Date.now()*(1.6+i*0.15))%(W+len));
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+len,ly);ctx.stroke();
    }
  }
  if(p.dashT>0){
    ctx.strokeStyle='rgba(255,230,150,0.35)';ctx.lineWidth=5;
    for(let i=0;i<10;i++){
      const a=(i/10)*Math.PI*2+Date.now()/300;
      const r1=Math.max(W,H)*0.55,r2=r1+120;
      ctx.beginPath();
      ctx.moveTo(W/2+Math.cos(a)*r1,H/2+Math.sin(a)*r1);
      ctx.lineTo(W/2+Math.cos(a)*r2,H/2+Math.sin(a)*r2);ctx.stroke();
    }
  }
  if(G.flashT>0){
    ctx.fillStyle='rgba(255,255,240,'+G.flashT*1.6+')';
    ctx.fillRect(0,0,W,H);
  }
  drawHUD();
  if(G.state==='card')drawCards();
  drawPads();
}

function drawHUD(){
  const G=Game,p=G.player,W=BAL.VIEW_W,H=BAL.VIEW_H;
  ctx.textAlign='left';
  ctx.font='34px monospace';
  for(let i=0;i<G.maxHearts();i++){
    ctx.fillStyle=i<p.hearts?'#ff4a6a':'rgba(0,0,0,0.3)';
    ctx.fillText('♥',16+i*36,44);
  }
  ctx.font="20px 'DotGothic16',monospace";
  ctx.strokeStyle='rgba(30,10,40,0.7)';ctx.lineWidth=4;ctx.fillStyle='#fff';
  const lvTxt=G.char().name+'  かぞくLv.'+G.familyLv;
  ctx.strokeText(lvTxt,16,78);ctx.fillText(lvTxt,16,78);
  const need=BAL.lvNeed(G.familyLv),ratio=G.familyLv>=BAL.lvMax?1:Math.min(1,G.crystals/need);
  ctx.fillStyle='rgba(0,0,0,0.35)';rr(ctx,230,63,150,15,7);ctx.fill();
  ctx.fillStyle='#6de0ff';rr(ctx,230,63,Math.max(10,150*ratio),15,7);ctx.fill();
  ctx.textAlign='right';
  ctx.font="34px 'DotGothic16',monospace";
  const kmh=G.speedKmh();
  ctx.fillStyle=p.dashT>0?'#ffd94d':(kmh>90?'#ffb060':'#fff');
  ctx.strokeText(kmh+'',W-70,52);ctx.fillText(kmh+'',W-70,52);
  ctx.font="16px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText('km/h',W-16,52);
  if(G.combo>=2){
    ctx.textAlign='center';
    const sc=1+Math.min(0.5,G.combo*0.03)+(G.comboT>G.comboWin()-0.15?0.3:0);
    ctx.save();ctx.translate(W/2,86);ctx.scale(sc,sc);
    ctx.font="30px 'DotGothic16',monospace";
    ctx.strokeStyle='rgba(30,10,40,0.8)';ctx.lineWidth=6;ctx.fillStyle='#ffd94d';
    ctx.strokeText(G.combo+' COMBO!',0,0);ctx.fillText(G.combo+' COMBO!',0,0);
    ctx.restore();
  }
  if(!G.bossActive&&!G.bossDefeated){
    const prog=Math.min(1,p.wx/G.courseEnd);
    ctx.fillStyle='rgba(0,0,0,0.35)';rr(ctx,W/2-200,16,400,10,5);ctx.fill();
    ctx.fillStyle='#7ee8a0';rr(ctx,W/2-200,16,Math.max(10,400*prog),10,5);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.textAlign='center';
    ctx.fillText('▶',W/2-200+400*prog,25);
    ctx.font="13px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillText('ステージ'+(G.stageIdx+1)+' '+G.stage().name,W/2,44);
  }
  if(G.boss){
    const b=G.boss;
    ctx.fillStyle='rgba(0,0,0,0.5)';rr(ctx,W/2-230,H-50,460,22,10);ctx.fill();
    ctx.fillStyle=b.state==='stun'?'#ffd94d':'#ff4a5a';
    rr(ctx,W/2-227,H-47,Math.max(6,454*Math.max(0,b.hp/b.maxHp)),16,8);ctx.fill();
    ctx.fillStyle='#fff';ctx.font="17px 'DotGothic16',monospace";ctx.textAlign='center';
    ctx.fillText(G.stage().boss.name+(b.state==='stun'?' 〜 いまだ! うちまくれ!!':''),W/2,H-56);
  }
  // ダッシュ (ストック対応)
  const maxD=G.dashMax();
  const dr=p.dashCharges>=maxD?1:1-Math.max(0,p.dashCd)/G.dashCdMax();
  ctx.fillStyle='rgba(0,0,0,0.35)';rr(ctx,16,H-34,170,18,9);ctx.fill();
  ctx.fillStyle=p.dashCharges>0?'#ffd94d':'#8a94b0';
  rr(ctx,19,H-31,Math.max(8,164*(p.dashCharges>0?1:dr)),12,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.textAlign='left';
  let dtxt=p.dashCharges>0?'ダッシュ OK!':'ダッシュ...';
  if(maxD>1)dtxt+=' ●'.repeat(p.dashCharges)+'○'.repeat(maxD-p.dashCharges);
  ctx.fillText(dtxt,22,H-40);
  if(G.msg){
    ctx.textAlign='center';
    ctx.font="28px 'DotGothic16',monospace";
    ctx.strokeStyle='rgba(30,10,40,0.85)';ctx.lineWidth=7;ctx.fillStyle='#ffe680';
    ctx.strokeText(G.msg,W/2,150);ctx.fillText(G.msg,W/2,150);
  }
  if(p.dead){
    ctx.fillStyle='rgba(10,0,20,'+Math.min(0.6,p.deadT)+')';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font="30px 'DotGothic16',monospace";ctx.textAlign='center';
    ctx.fillText('ドンマイ! もういっちょ!!',W/2,H/2);
  }
}

function drawCards(){
  const G=Game,W=BAL.VIEW_W,H=BAL.VIEW_H;
  ctx.fillStyle='rgba(10,4,26,0.72)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font="38px 'DotGothic16',monospace";
  ctx.fillStyle='#ffd94d';ctx.strokeStyle='rgba(30,10,40,0.9)';ctx.lineWidth=8;
  ctx.strokeText('レベルアップ!! カードを えらぼう',W/2,110);
  ctx.fillText('レベルアップ!! カードを えらぼう',W/2,110);
  const n=G.cardOptions.length,cw=250,chh=250,gap=36;
  const total=n*cw+(n-1)*gap,x0=W/2-total/2;
  G.cardRects=[];
  const picks=G.charPicks[G.charId]||{};
  for(let i=0;i<n;i++){
    const c=G.cardOptions[i];
    const x=x0+i*(cw+gap),y=H/2-chh/2+16;
    G.cardRects.push({x,y,w:cw,h:chh});
    const sel=(i===G.cardSel);
    const bob=sel?Math.sin(Date.now()/180)*5:0;
    ctx.fillStyle=c.char?'#3a2450':'#26304e';
    rr(ctx,x,y-bob,cw,chh,16);ctx.fill();
    ctx.strokeStyle=sel?'#ffd94d':'rgba(255,255,255,0.35)';ctx.lineWidth=sel?6:3;
    rr(ctx,x,y-bob,cw,chh,16);ctx.stroke();
    if(c.char){
      ctx.fillStyle='#ffb0e0';ctx.font="15px 'DotGothic16',monospace";
      ctx.fillText(CHARS[c.char].name+' せんよう',x+cw/2,y-bob+26);
    }
    ctx.font='58px sans-serif';
    ctx.fillText(c.icon,x+cw/2,y-bob+100);
    ctx.font="21px 'DotGothic16',monospace";ctx.fillStyle='#fff';
    ctx.fillText(c.name,x+cw/2,y-bob+140);
    ctx.font="15px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.85)';
    wrapText(c.desc,x+cw/2,y-bob+168,cw-30,20);
    const have=picks[c.id]||0;
    ctx.font="16px monospace";ctx.fillStyle='#ffd94d';
    let pips='';
    for(let k=0;k<c.max;k++)pips+=(k<have?'★':'☆');
    ctx.fillText(pips,x+cw/2,y-bob+chh-18);
  }
  ctx.font="17px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText(TOUCH_MODE?'カードを タップ!':'1/2/3キー か B=つぎ A=けってい',W/2,H-56);
  if(G.pendingPicks>1){
    ctx.fillStyle='#7ee8a0';
    ctx.fillText('のこり '+G.pendingPicks+'かい えらべるよ',W/2,H-30);
  }
}
function wrapText(text,cx,cy,maxW,lh){
  const chars=text.split('');
  let line='',y=cy;
  for(const ch of chars){
    if(ctx.measureText(line+ch).width>maxW){ctx.fillText(line,cx,y);line=ch;y+=lh;}
    else line+=ch;
  }
  if(line)ctx.fillText(line,cx,y);
}

function drawSelect(){
  const G=Game,W=BAL.VIEW_W,H=BAL.VIEW_H;
  drawBG(G.stage(),Date.now()*0.05);
  ctx.fillStyle='rgba(10,4,26,0.55)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font="20px 'DotGothic16',monospace";ctx.fillStyle='#8ad4f5';
  ctx.fillText('ステージ'+(G.stageIdx+1)+': '+G.stage().name,W/2,52);
  ctx.font="34px 'DotGothic16',monospace";
  ctx.strokeStyle='rgba(30,10,40,0.9)';ctx.lineWidth=7;ctx.fillStyle='#ffd94d';
  ctx.strokeText('だれで はしる?',W/2,98);ctx.fillText('だれで はしる?',W/2,98);
  const n=CHAR_ORDER.length,cw=166,chh=250,gap=16;
  const total=n*cw+(n-1)*gap,x0=W/2-total/2;

    rr(ctx,x,y,cw,chh,14);ctx.fill();
    ctx.strokeStyle=sel?'#ffd94d':'rgba(255,255,255,0.25)';ctx.lineWidth=sel?5:2;
    rr(ctx,x,y,cw,chh,14);ctx.stroke();
    const f=Math.floor(Date.now()/150)%4;
    const leg=sel?['run0','run1','run2','run1'][f]:'run1';
    drawPix(ctx,id+'_'+(sel?'jump':'run')+'_'+leg,x+cw/2,y+150,false);
    ctx.font="20px 'DotGothic16',monospace";ctx.fillStyle='#fff';
    ctx.fillText(c.name,x+cw/2,y+178);
    ctx.font="13px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillText(c.role,x+cw/2,y+198);
    ctx.fillStyle='#8ad4f5';
    ctx.fillText(c.weapon,x+cw/2,y+218);
    const taken=G.picksTaken(id);
    const pend=Math.max(0,(G.familyLv-1)-taken);
    if(pend>0){
      ctx.fillStyle='#ffd94d';ctx.font="15px 'DotGothic16',monospace";
      ctx.fillText('+'+pend+'まい カード!',x+cw/2,y+240);
    }else if(taken>0){
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font="13px monospace";
      ctx.fillText('★'.repeat(Math.min(taken,10)),x+cw/2,y+240);
    }
  }
  const bw=280,bh=58,bx=W/2-bw/2,by=H-100;
  G.startRect={x:bx,y:by,w:bw,h:bh};
  ctx.fillStyle='#ffd94d';rr(ctx,bx,by,bw,bh,16);ctx.fill();
  ctx.fillStyle='#3a2010';ctx.font="26px 'DotGothic16',monospace";
  ctx.fillText('スタート!!',W/2,by+38);
  ctx.font="14px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText(TOUCH_MODE?'タップでえらんで もういちどタップ or スタート!':'←→/1-5でえらぶ  A(Z/スペース)でけってい',W/2,H-24);
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('とったカードは そのキャラに ずっとキープされるよ',W/2,128);
}

function drawStageClear(){
  const G=Game,W=BAL.VIEW_W,H=BAL.VIEW_H,s=G.clearStats;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#2a1a4a');sky.addColorStop(1,'#5a2a7a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font="44px 'DotGothic16',monospace";
  ctx.strokeStyle='#5a2010';ctx.lineWidth=10;
  const t1='ステージ'+(G.stageIdx+1)+' クリア!!';
  ctx.strokeText(t1,W/2,90);ctx.fillStyle='#ffd94d';ctx.fillText(t1,W/2,90);
  const f=Math.floor(Date.now()/200)%2;
  drawPix(ctx,G.charId+'_jump_jump',W/2,270+f*3,false);
  ctx.font="21px 'DotGothic16',monospace";ctx.fillStyle='#fff';
  const mins=Math.floor(s.time/60),secs=Math.floor(s.time%60);
  ctx.fillText('タイム '+mins+':'+String(secs).padStart(2,'0')+'  さいこう '+s.kmh+'km/h  コンボ '+s.combo+'  かぞくLv.'+s.lv,W/2,320);
  // あいことば
  ctx.font="19px 'DotGothic16',monospace";ctx.fillStyle='#8ad4f5';
  ctx.fillText('▼ あいことば (メモしてね! つづきから あそべるよ) ▼',W/2,372);
  ctx.fillStyle='rgba(0,0,0,0.4)';rr(ctx,W/2-330,388,660,84,12);ctx.fill();
  ctx.font="26px 'DotGothic16',monospace";ctx.fillStyle='#ffe680';
  const pw=G.password;
  const half=Math.ceil(pw.length/2);
  ctx.fillText(pw.slice(0,half).split('').join(' '),W/2,424);
  ctx.fillText(pw.slice(half).split('').join(' '),W/2,458);
  if(G.resultT>1.4&&Math.floor(Date.now()/500)%2===0){
    ctx.fillStyle='#fff';ctx.font="22px 'DotGothic16',monospace";
    ctx.fillText('タップで つぎのステージへ (キャラをかえられるよ)',W/2,H-30);
  }
}

function drawAllClear(){
  const G=Game,W=BAL.VIEW_W,H=BAL.VIEW_H,s=G.clearStats;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1a2a5a');sky.addColorStop(0.6,'#5a2a7a');sky.addColorStop(1,'#ff9a56');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font="56px 'DotGothic16',monospace";
  ctx.strokeStyle='#5a2010';ctx.lineWidth=12;
  ctx.strokeText('ぜんステージ クリア!!',W/2,120);
  ctx.fillStyle='#ffd94d';ctx.fillText('ぜんステージ クリア!!',W/2,120);
  // かぞく全員でジャンプ
  const f=Math.floor(Date.now()/180)%2;
  CHAR_ORDER.forEach((id,i)=>{
    drawPix(ctx,id+'_jump_jump',W/2+(i-2)*130,330+((i+f)%2)*10,false);
  });
  ctx.font="24px 'DotGothic16',monospace";ctx.fillStyle='#fff';
  const mins=Math.floor(G.totalTime/60),secs=Math.floor(G.totalTime%60);
  ctx.fillText('トータル '+mins+':'+String(secs).padStart(2,'0')+'  クリスタル '+G.totalCrystals+'  かぞくLv.'+G.familyLv,W/2,400);
  ctx.font="20px 'DotGothic16',monospace";ctx.fillStyle='#ffb0e0';
  ctx.fillText('ドスゴロいっかを ぜんいん ぶっとばした! かぞくの きずなの しょうりだ!!',W/2,444);
  if(G.resultT>2&&Math.floor(Date.now()/500)%2===0){
    ctx.fillStyle='#fff';ctx.font="22px 'DotGothic16',monospace";
    ctx.fillText('タップで タイトルへ',W/2,H-36);
  }
}

const PADS=[];
let TOUCH_MODE=false;
function layoutPads(){
  PADS.length=0;
  const H=BAL.VIEW_H,W=BAL.VIEW_W;
  PADS.push({key:'dash',x:100,y:H-120,r:62,label:'B',sub:'ダッシュ'});
  PADS.push({key:'jump',x:W-100,y:H-120,r:66,label:'A',sub:'ジャンプ'});
}
function drawPads(){
  if(!TOUCH_MODE||Game.state!=='play')return;
  ctx.textAlign='center';
  for(const b of PADS){
    ctx.fillStyle=Input.raw[b.key]?'rgba(255,255,255,0.45)':'rgba(255,255,255,0.16)';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font="30px 'DotGothic16',monospace";
    ctx.fillText(b.label,b.x,b.y+11);
    ctx.font="14px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fillText(b.sub,b.x,b.y+b.r+20);
  }
}

function drawTitle(){
  const W=BAL.VIEW_W,H=BAL.VIEW_H;
  drawBG(STAGES[0],Date.now()*0.06);
  ctx.textAlign='center';
  ctx.font="22px 'DotGothic16',monospace";ctx.fillStyle='#ffe0f0';
  ctx.fillText('かぞくゲームシリーズ',W/2,H*0.16);
  ctx.font="66px 'DotGothic16',monospace";
  ctx.save();ctx.translate(W/2,H*0.32);ctx.rotate(-0.03);
  ctx.strokeStyle='#5a2010';ctx.lineWidth=14;ctx.strokeText('ひがしやまダッシュ!',0,0);
  ctx.fillStyle='#ffd94d';ctx.fillText('ひがしやまダッシュ!',0,0);
  ctx.restore();
  // 5人ならんで走る
  const f=Math.floor(Date.now()/140)%4;
  CHAR_ORDER.forEach((id,i)=>{
    const leg=['run0','run1','run2','run1'][(f+i)%4];
    drawPix(ctx,id+'_run_'+leg,W/2+(i-2)*110,H*0.72,false);
  });
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=3;
  for(let i=0;i<7;i++){
    const ly=H*0.42+i*30,lx=W-((Date.now()*(1+i*0.2))%(W+200));
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+120,ly);ctx.stroke();
  }
  if(Math.floor(Date.now()/500)%2===0){
    ctx.font="26px 'DotGothic16',monospace";ctx.fillStyle='#fff';
    ctx.fillText(TOUCH_MODE?'タップで はじめから!!':'なにかキーで はじめから!!',W/2,H*0.86);
  }
  // つづきからボタン
  const bw=310,bh=46,bx=W-bw-18,by=H-64;
  Game.titleRects.load={x:bx,y:by,w:bw,h:bh};
  ctx.fillStyle='rgba(255,255,255,0.14)';rr(ctx,bx,by,bw,bh,12);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;rr(ctx,bx,by,bw,bh,12);ctx.stroke();
  ctx.font="19px 'DotGothic16',monospace";ctx.fillStyle='#8ad4f5';
  ctx.fillText('あいことばで つづきから'+(TOUCH_MODE?'':' (9キー)'),bx+bw/2,by+30);
  ctx.font="14px 'DotGothic16',monospace";ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('5にんの かぞくで 4つのステージを かけぬけろ!',W/2,H*0.94);
}

// ---------------- 起動 ----------------
function showPwInput(){
  const pw=document.getElementById('pw');
  pw.style.display='flex';
  const inp=document.getElementById('pwin');
  inp.value='';document.getElementById('pwmsg').textContent='';
  setTimeout(()=>inp.focus(),50);
}
if(!HEADLESS){
  cv=document.getElementById('cv');
  cv.width=BAL.VIEW_W;cv.height=BAL.VIEW_H;
  ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  function fit(){
    const s=Math.min(window.innerWidth/BAL.VIEW_W,window.innerHeight/BAL.VIEW_H);
    cv.style.width=(BAL.VIEW_W*s)+'px';cv.style.height=(BAL.VIEW_H*s)+'px';
  }
  window.addEventListener('resize',fit);fit();
  layoutPads();
  // あいことば入力
  document.getElementById('pwok').addEventListener('click',()=>{
    const v=document.getElementById('pwin').value;
    const data=Password.decode(v);
    if(!data){document.getElementById('pwmsg').textContent='あいことばが ちがうみたい…';return;}
    document.getElementById('pw').style.display='none';
    AudioEng.init();
    Game.loadGame(data);
  });
  document.getElementById('pwng').addEventListener('click',()=>{
    document.getElementById('pw').style.display='none';
  });
  const keymap={' ':'jump',z:'jump',ArrowUp:'jump',w:'jump',x:'dash',c:'dash',Shift:'dash'};
  window.addEventListener('keydown',e=>{
    if(document.getElementById('pw').style.display==='flex')return;
    AudioEng.init();
    if(e.key>='1'&&e.key<='5')Input.keyNum=+e.key;
    if(e.key==='9')Input.keyNum=9;
    if(e.key==='ArrowLeft')Input.keyLeft=true;
    if(e.key==='ArrowRight')Input.keyRight=true;
    const k=keymap[e.key];if(k){Input.raw[k]=true;e.preventDefault();}
    Input.raw.any=true;
  });
  window.addEventListener('keyup',e=>{
    const k=keymap[e.key];if(k)Input.raw[k]=false;
    Input.raw.any=false;
  });
  const touches={};
  function viewXY(px,py){
    const rect=cv.getBoundingClientRect();
    return{x:(px-rect.left)*BAL.VIEW_W/rect.width,y:(py-rect.top)*BAL.VIEW_H/rect.height};
  }
  function padHit(px,py){
    const v=viewXY(px,py);
    for(const b of PADS)if(Math.hypot(v.x-b.x,v.y-b.y)<b.r*1.3)return b.key;
    return v.x<BAL.VIEW_W/2?'dash':'jump';
  }
  function refresh(){
    for(const b of PADS)Input.raw[b.key]=false;
    for(const id in touches)if(touches[id])Input.raw[touches[id]]=true;
  }
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();TOUCH_MODE=true;AudioEng.init();
    const t0=e.changedTouches[0];
    Input.tap=viewXY(t0.clientX,t0.clientY);
    if(Game.state==='play'){
      Input.raw.any=true;
      for(const t of e.changedTouches)touches[t.identifier]=padHit(t.clientX,t.clientY);
      refresh();
    }else if(Game.state==='stageclear'||Game.state==='allclear'||Game.state==='title'){
      Input.raw.any=true;
    }
  },{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(Game.state==='play'){
      for(const t of e.changedTouches)touches[t.identifier]=padHit(t.clientX,t.clientY);
      refresh();
    }
  },{passive:false});
  const tEnd=e=>{
    e.preventDefault();
    for(const t of e.changedTouches)delete touches[t.identifier];
    refresh();Input.raw.any=false;
  };
  cv.addEventListener('touchend',tEnd,{passive:false});
  cv.addEventListener('touchcancel',tEnd,{passive:false});
  cv.addEventListener('mousedown',e=>{
    AudioEng.init();Input.raw.any=true;
    Input.tap=viewXY(e.clientX,e.clientY);
  });
  cv.addEventListener('mouseup',()=>{Input.raw.any=false;});

  let last=performance.now(),acc=0;
  const STEP=1/60;
  function loop(now){
    acc+=Math.min(0.1,(now-last)/1000);last=now;
    while(acc>=STEP){Game.update(STEP);acc-=STEP;}
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

if(typeof module!=='undefined'){
  module.exports={Game,Input,BAL,CARDS,CHARS,CHAR_ORDER,STAGES,Password,pickOrder};
}
