<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひがしやまクエスト 〜まおうのとう〜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
:root{
  --bg:#0c102e; --bg2:#141a42; --panel:#1a2148; --panel2:#232c5e;
  --ink:#f2efe0; --ink-dim:#9aa3c8; --line:#45529a;
  --gold:#ffd94d; --red:#ff6b5a; --green:#5ad46a; --pink:#ff8fb8; --blue:#6aa8ff; --purple:#b78ee0;
  --hp:#ff6b5a; --blk:#7fb2e5; --energy:#ffd94d;
  --atk:#d97a5a; --skl:#6a9fc9; --pow:#b78ee0;
}
*{box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:
    radial-gradient(900px 500px at 50% -160px, #26306b 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 42px, rgba(255,255,255,.02) 42px 44px),
    var(--bg);
  color:var(--ink);
  font-family:"DotGothic16","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  overflow:hidden;
  touch-action:manipulation;
}
canvas{image-rendering:pixelated; image-rendering:crisp-edges;}
#app{height:100%; height:100dvh; display:flex; flex-direction:column; max-width:1100px; margin:0 auto; position:relative;}
.screen{display:none; flex:1; flex-direction:column; overflow-y:auto; padding:16px;}
.screen.on{display:flex;}
h1,h2,h3{font-weight:600; letter-spacing:.1em;}
button{
  font-family:inherit; color:var(--ink); background:var(--panel2);
  border:2px solid var(--line); border-radius:8px; padding:10px 18px;
  font-size:15px; cursor:pointer; letter-spacing:.06em; transition:all .12s;
  box-shadow:0 3px 0 #10153a;
}
button:hover{border-color:var(--gold); background:#2c3775; transform:translateY(-1px);}
button:active{transform:translateY(2px); box-shadow:0 1px 0 #10153a;}
button:disabled{opacity:.4; cursor:default; transform:none;}
.small{font-size:12px; color:var(--ink-dim);}

/* ---------- Sprites ---------- */
.spr{display:inline-block; line-height:0;}
.spr canvas{display:block;}
.spr canvas:nth-child(2){display:none;}
body.walk2 .spr canvas:nth-child(1){display:none;}
body.walk2 .spr canvas:nth-child(2){display:block;}
.spr.flipx canvas{transform:scaleX(-1);}

/* ---------- Title ---------- */
#title-screen{align-items:center; justify-content:center; text-align:center; gap:16px;}
.title-sym{display:flex; gap:18px; align-items:flex-end; justify-content:center; min-height:70px;}
.title-main{font-size:46px; letter-spacing:.18em; text-indent:.18em;
  background:linear-gradient(180deg,#fff4c0,#ffd94d 55%,#d9a017); -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 4px 0 rgba(0,0,0,.35);}
.title-sub{color:var(--ink-dim); letter-spacing:.28em; font-size:13px;}
.title-note{max-width:600px; font-size:13px; line-height:2; color:var(--ink-dim);}
.clear-stars{font-size:14px; color:var(--gold); letter-spacing:.15em; min-height:18px;}
#pass-row{display:flex; gap:8px; align-items:center; justify-content:center;}
#pass-input{
  font-family:inherit; font-size:16px; letter-spacing:.3em; text-align:center; text-transform:uppercase;
  width:120px; padding:8px; background:#0a0d24; color:var(--gold);
  border:2px solid var(--line); border-radius:8px; outline:none;
}
#pass-input:focus{border-color:var(--gold);}

/* ---------- Character select ---------- */
#char-screen h2{text-align:center; margin-bottom:14px;}
.char-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px;}
.char-card{
  background:var(--panel); border:2px solid var(--line); border-radius:12px;
  padding:16px 14px; cursor:pointer; transition:all .15s; position:relative; overflow:hidden;
}
.char-card:hover{transform:translateY(-3px); border-color:var(--c,var(--gold));}
.char-card .glyph{text-align:center; margin-bottom:8px; min-height:60px; display:flex; align-items:flex-end; justify-content:center;}
.char-card h3{text-align:center; font-size:18px; color:var(--c); margin-bottom:2px;}
.char-card .role{text-align:center; font-size:12px; color:var(--ink-dim); margin-bottom:10px; letter-spacing:.15em;}
.char-card p{font-size:12.5px; line-height:1.8; color:#cdd2e8;}
.char-card .mech{margin-top:10px; font-size:12px; color:var(--c); border-top:1px dashed var(--line); padding-top:8px; line-height:1.7;}
.char-card .cleared{position:absolute; top:8px; right:10px; color:var(--gold); font-size:16px;}

/* ---------- Top bar ---------- */
#topbar{
  display:none; align-items:center; gap:14px; padding:8px 16px;
  background:rgba(10,13,36,.92); border-bottom:2px solid var(--line); font-size:14px;
  position:sticky; top:0; z-index:5;
}
#topbar.on{display:flex;}
#topbar .name{color:var(--gold); letter-spacing:.08em; display:flex; align-items:center; gap:8px;}
#topbar .hpv{color:var(--hp);}
#topbar .gold{color:var(--energy);}
#topbar .floorv{color:var(--ink-dim);}
#relic-row{margin-left:auto; display:flex; gap:6px;}
.relic{
  width:30px; height:30px; border-radius:50%; background:var(--panel2);
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
  font-size:15px; cursor:help; position:relative;
}
.relic.ancient{border:2px solid var(--gold); box-shadow:0 0 8px rgba(255,217,77,.4);}
.relic:hover::after,.potion:hover::after{
  content:attr(data-tip); position:absolute; top:34px; right:0; width:200px; z-index:30;
  background:#0a0d24; border:1px solid var(--gold); border-radius:6px; padding:8px 10px;
  font-size:11.5px; line-height:1.6; color:var(--ink); white-space:normal;
}
#potion-row{display:flex; gap:6px; margin-left:10px;}
.potion{
  width:32px; height:32px; border-radius:8px; background:#132046;
  border:2px solid var(--blue); display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; position:relative; transition:transform .12s, box-shadow .12s;
  box-shadow:0 0 8px rgba(106,168,255,.25);
}
.potion:hover{transform:translateY(-2px); box-shadow:0 0 12px rgba(106,168,255,.5);}
.potion.used{opacity:.32; border-color:var(--line); box-shadow:none; cursor:default; filter:grayscale(.7);}
.potion.used:hover{transform:none;}
#deck-btn,#mute-btn{margin-left:8px; padding:5px 12px; font-size:12px;}

/* ---------- バージョンタグ ---------- */
.ver-tag{margin-top:6px; font-size:11px; letter-spacing:.12em; color:var(--ink-dim); opacity:.6;}

/* ---------- カードずかん ---------- */
#cards-screen{align-items:stretch;}
.cat-section{max-width:960px; margin:0 auto 22px; width:100%;}
.cat-head{text-align:center; letter-spacing:.12em; margin-bottom:10px; border-bottom:1px dashed var(--line); padding-bottom:6px;}
.cat-grid{display:flex; flex-wrap:wrap; gap:10px; justify-content:center;}

/* ---------- Map (ルート分岐) ---------- */
#map-screen{align-items:center;}
#map-screen h2{margin-bottom:4px;}
.map-sub{color:var(--ink-dim); font-size:13px; margin-bottom:16px; letter-spacing:.12em; text-align:center;}
/* たてに つらなる ルートマップ（うえ=スタート / した=ボス） */
.map-view{display:flex; flex-direction:column; align-items:center; gap:0; width:100%; max-width:520px; margin:0 auto;}
.map-col{display:flex; justify-content:center; align-items:flex-start; width:100%; position:relative;}
.map-col.single{padding:4px 0;}
.map-col.branch{gap:10px; padding:2px 0;}
/* れつ どうしを つなぐ たて線 */
.map-col::before{content:""; position:absolute; top:-14px; left:50%; width:3px; height:16px; background:var(--line); transform:translateX(-50%); z-index:0;}
.map-col:first-child::before{display:none;}
.map-lane{display:flex; flex-direction:column; gap:8px; flex:1; align-items:center; max-width:150px; position:relative;}
.map-lane .lane-name{font-size:11px; color:var(--ink-dim); letter-spacing:.06em; margin-bottom:2px; min-height:14px; text-align:center;}
.map-lane.laneskip{opacity:.32; filter:grayscale(.6);}
/* レーンないの ノードを つなぐ たて線 */
.map-lane .map-node:not(:last-child)::after{content:""; position:absolute; bottom:-8px; left:50%; width:2px; height:8px; background:var(--line); transform:translateX(-50%);}
.map-node{
  position:relative; z-index:1; width:132px; max-width:100%;
  background:var(--panel); border:2px solid var(--line); border-radius:10px;
  padding:9px 8px; display:flex; align-items:center; gap:8px; justify-content:center;
  transition:transform .12s, border-color .12s, background .12s;
}
.map-node .mn-glyph{font-size:22px; line-height:1;}
.map-node .mn-label{font-size:12px; letter-spacing:.06em;}
.map-node.future{opacity:.62;}
.map-node.done{opacity:.4; border-color:var(--green);}
.map-node.done .mn-label::after{content:" ✓"; color:var(--green);}
.map-node.now{
  border-color:var(--gold); background:var(--panel2); cursor:pointer;
  box-shadow:0 0 0 0 rgba(255,217,77,.5); animation:mapPulse 1.3s infinite;
}
@keyframes mapPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,217,77,.45);}50%{box-shadow:0 0 0 7px rgba(255,217,77,0);}}
.map-node.now:hover{transform:translateY(-2px);}
.map-node.boss{border-color:var(--red);}
.map-node.boss .mn-glyph{font-size:26px;}
@media (max-width:700px){
  .map-view{max-width:100%;}
  .map-col.branch{gap:5px;}
  .map-lane{max-width:none;}
  .map-node{width:auto; min-width:0; padding:8px 5px; flex-direction:column; gap:3px; text-align:center;}
  .map-node .mn-glyph{font-size:19px;}
  .map-node .mn-label{font-size:10px;}
  .map-lane .lane-name{font-size:9.5px;}
}

/* ---------- Combat ---------- */
#combat-screen{padding:10px 16px; overflow:hidden;}
#enemy-zone{
  flex:1; display:flex; gap:22px; align-items:center; justify-content:center;
  min-height:190px; flex-wrap:wrap;
}
.enemy{
  width:190px; text-align:center; padding:12px 10px; border-radius:12px;
  border:2px solid transparent; transition:transform .15s, opacity .4s;
  position:relative;
}
.enemy.targetable{border-color:var(--red); cursor:pointer; animation:targetPulse 1s infinite;}
@keyframes targetPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,90,.35);}50%{box-shadow:0 0 0 8px rgba(255,107,90,0);}}
.enemy.dead{display:none;}
.enemy.slain{opacity:0; transform:scale(.7) rotate(8deg);}
.enemy.lunge .eglyph{animation:lunge .5s;}
@keyframes lunge{0%{transform:translateY(0);}30%{transform:translateY(26px) scale(1.06);}100%{transform:translateY(0);}}
.enemy.hit .eglyph{animation:ehit .35s;}
@keyframes ehit{0%{transform:translateX(0); filter:brightness(2.2);}30%{transform:translateX(-7px);}60%{transform:translateX(5px);}100%{transform:translateX(0); filter:none;}}
.eglyph{min-height:76px; display:flex; align-items:flex-end; justify-content:center; margin-bottom:6px; filter:drop-shadow(0 5px 3px rgba(0,0,0,.45));}
.enemy.boss .eglyph{min-height:110px;}
.ename{font-size:14px; letter-spacing:.08em; margin-bottom:5px;}
.intent{font-size:12.5px; color:#ffce9e; min-height:18px; margin-bottom:6px;}
.hpbar{
  position:relative; height:16px; background:#0a0d24; border-radius:8px; overflow:hidden;
  border:1px solid var(--line);
}
.hpbar .fill{position:absolute; inset:0; background:linear-gradient(180deg,#ff8a70,#d9463a); transition:width .3s; border-radius:8px;}
.hpbar .blkfill{position:absolute; inset:0; background:rgba(127,178,229,.35);}
.hpbar .txt{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; z-index:2; text-shadow:0 1px 2px #000;}
.statuses{margin-top:6px; display:flex; gap:5px; justify-content:center; flex-wrap:wrap; min-height:20px;}
.st{font-size:10.5px; padding:2px 7px; border-radius:9px; border:1px solid var(--line);}
.st.buff{color:var(--green); border-color:var(--green);}
.st.debuff{color:var(--red); border-color:var(--red);}

#player-zone{
  display:flex; align-items:center; gap:16px; padding:10px 6px;
  border-top:2px solid var(--line);
}
#p-portrait{
  width:74px; height:74px; border-radius:12px; border:2px solid var(--gold);
  display:flex; align-items:flex-end; justify-content:center; background:var(--panel);
  flex-shrink:0; position:relative; overflow:visible; padding-bottom:4px;
}
#p-portrait.shake{animation:pshake .4s;}
@keyframes pshake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(5px);}75%{transform:translateX(-3px);}}
#p-portrait.blockp{animation:pblock .6s;}
@keyframes pblock{0%{box-shadow:0 0 0 0 rgba(127,178,229,.8);}100%{box-shadow:0 0 0 14px rgba(127,178,229,0);}}
#p-portrait.healp{animation:pheal .6s;}
@keyframes pheal{0%{box-shadow:0 0 0 0 rgba(90,212,106,.8);}100%{box-shadow:0 0 0 14px rgba(90,212,106,0);}}
#p-info{flex:1; min-width:0;}
.p-name-row{display:flex; align-items:center; gap:8px; margin-bottom:5px;}
#p-name{font-size:15px; flex:1; min-width:0;}
#mech-help{
  flex-shrink:0; width:22px; height:22px; padding:0; font-size:13px; line-height:1;
  border-radius:50%; background:var(--panel2); border:1px solid var(--line); box-shadow:none;
}
#mech-help:hover{border-color:var(--gold); background:#2c3775; transform:none;}
#energy-orb{
  width:56px; height:56px; border-radius:50%; flex-shrink:0;
  background:radial-gradient(circle at 35% 30%, #fff0b0, var(--energy) 55%, #b8860b);
  color:#241c0a; font-weight:bold; font-size:17px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 14px rgba(255,217,77,.35); transition:transform .15s;
}
#energy-orb.spend{transform:scale(.82);}
#pile-info{font-size:12px; color:var(--ink-dim); display:flex; flex-direction:column; gap:3px; flex-shrink:0;}
#end-turn{flex-shrink:0; border-color:var(--gold);}
#hand{
  display:flex; gap:8px; justify-content:flex-start; align-items:flex-end;
  min-height:216px; padding:26px 8px 6px; flex-wrap:nowrap;
  overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
  overscroll-behavior-x:contain;
}
#hand .card:first-child{margin-left:auto;}
#hand .card:last-child{margin-right:auto;}
#hand::-webkit-scrollbar{height:6px;}
#hand::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}
.card{
  width:132px; height:184px; background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:2px solid var(--line); border-radius:10px; position:relative;
  cursor:pointer; transition:transform .12s, box-shadow .12s; flex-shrink:0;
  padding:6px 7px 7px; display:flex; flex-direction:column;
}
.card:hover{transform:translateY(-14px) scale(1.05); z-index:4; box-shadow:0 10px 22px rgba(0,0,0,.5);}
.card.selected{transform:translateY(-18px) scale(1.07); box-shadow:0 0 0 2px var(--gold), 0 12px 24px rgba(0,0,0,.5); z-index:4;}
.card.unplayable{opacity:.5;}
.card.deal{animation:dealIn .3s backwards;}
@keyframes dealIn{from{transform:translateY(60px) scale(.7); opacity:0;} to{transform:none; opacity:1;}}
.card.upg .cname{color:var(--green);}
.card .cost{
  position:absolute; top:-8px; left:-8px; width:26px; height:26px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff0b0, var(--energy) 60%, #b8860b);
  color:#241c0a; font-weight:bold; display:flex; align-items:center; justify-content:center; font-size:14px;
  border:1px solid #8a6d1c; z-index:2;
}
.card .cname{font-size:12px; text-align:center; letter-spacing:.02em; margin-bottom:4px; min-height:16px;}
.card .cart{
  height:52px; border-radius:6px; margin-bottom:4px; position:relative;
  background:linear-gradient(160deg, var(--artg1), var(--artg2));
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.card .cemo{font-size:26px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));}
.card .csym{position:absolute; right:5px; bottom:2px; font-size:11px; opacity:.95;}
.card .ctype{font-size:9.5px; text-align:center; color:var(--cc); letter-spacing:.25em; margin-bottom:4px;}
.card .cdesc{font-size:10.8px; line-height:1.55; text-align:center; color:#d5d9ec; flex:1; display:flex; align-items:center; justify-content:center; padding:0 2px;}
.card .cdesc>span{display:block; width:100%; word-break:normal; overflow-wrap:anywhere;}   /* 用語(<b>)を含んでも 横読みで 折り返す */
.card .cdesc b{color:var(--gold); font-weight:bold;}
.card .crar{
  position:absolute; top:-8px; right:-6px; min-width:20px; height:20px; padding:0 5px;
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:bold; z-index:2; border:1px solid rgba(0,0,0,.4); color:#1a1226; letter-spacing:.02em;
}
.rar-S{background:#9aa0b8;} .rar-C{background:#cdd2e6;} .rar-U{background:#7fb2e5;} .rar-R{background:var(--gold);}
.fly-card{position:fixed; z-index:60; pointer-events:none; transition:transform .42s cubic-bezier(.5,-0.1,.7,1), opacity .42s;}
.fly-card.gone{opacity:0;}
/* てきから ダメージを うけたとき 画面ぜんたいが ゆれる（ガードなら ゆれない）*/
#app.shakescr{animation:shakescr .4s;}
@keyframes shakescr{0%,100%{transform:translate(0,0);}15%{transform:translate(-7px,4px);}30%{transform:translate(6px,-4px);}45%{transform:translate(-5px,3px);}60%{transform:translate(4px,-2px);}80%{transform:translate(-2px,1px);}}
.floaty{
  position:absolute; font-size:18px; font-weight:bold; pointer-events:none; z-index:20;
  animation:floatUp .8s forwards; text-shadow:0 2px 3px #000;
}
@keyframes floatUp{from{transform:translateY(0); opacity:1;} to{transform:translateY(-44px); opacity:0;}}
#turn-banner{
  position:absolute; top:34%; left:50%; transform:translate(-50%,-50%);
  font-size:30px; letter-spacing:.4em; text-indent:.4em; color:var(--gold);
  opacity:0; pointer-events:none; z-index:40; text-shadow:0 0 22px rgba(255,217,77,.5);
}
#turn-banner.foe{color:var(--red); text-shadow:0 0 22px rgba(255,107,90,.5);}
#turn-banner.show{animation:bannerIn 1s;}
@keyframes bannerIn{0%{opacity:0; transform:translate(-50%,-50%) scale(.8);}18%{opacity:1; transform:translate(-50%,-50%) scale(1);}80%{opacity:1;}100%{opacity:0;}}

/* ---------- Center screens ---------- */
.center-col{align-items:center; justify-content:center; text-align:center; gap:14px;}
.flavor{max-width:520px; line-height:2; color:#cdd2e8; font-size:13.5px;}
.card-list{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin:8px 0;}
.card-list .card{cursor:pointer;}
.opt-col{display:flex; flex-direction:column; gap:10px; margin-top:10px; min-width:300px;}
.shop-grid{display:flex; gap:18px; flex-wrap:wrap; justify-content:center; margin:10px 0;}
.shop-item{display:flex; flex-direction:column; align-items:center; gap:6px;}
.shop-item .price{color:var(--energy); font-size:13px;}
.shop-item.sold{opacity:.3; pointer-events:none;}

/* ---------- Overlay ---------- */
#overlay{
  display:none; position:fixed; inset:0; background:rgba(5,7,20,.85); z-index:50;
  align-items:center; justify-content:center; padding:20px;
}
#overlay.on{display:flex;}
#overlay-box{
  background:var(--bg2); border:2px solid var(--line); border-radius:12px;
  max-width:860px; max-height:82vh; overflow-y:auto; padding:20px; text-align:center;
}
#overlay-box h3{margin-bottom:12px; letter-spacing:.15em;}
/* かくにん ポップアップ（ホーム／ポーション）*/
#confirm{
  display:none; position:fixed; inset:0; background:rgba(5,7,20,.86); z-index:100000;
  align-items:center; justify-content:center; padding:20px;
}
#confirm.on{display:flex;}
#confirm-box{
  background:var(--bg2); border:2px solid var(--gold); border-radius:14px;
  max-width:340px; width:100%; padding:22px 20px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.6);
}
#confirm-msg{font-size:15px; line-height:1.9; margin-bottom:18px;}
#confirm-msg .small{display:block; margin-top:6px; font-size:12px; color:var(--ink-dim);}
#confirm-btns{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
#confirm-btns button{min-width:110px; padding:11px 16px; font-size:15px;}
#confirm-btns .cf-yes{border-color:var(--gold);}
#toast{
  display:none; position:fixed; bottom:220px; left:50%; transform:translateX(-50%);
  background:#0a0d24; border:1px solid var(--gold); color:var(--ink);
  padding:9px 20px; border-radius:20px; font-size:13px; z-index:70; letter-spacing:.05em;
  white-space:nowrap;
}
@media (max-width:700px){
  .screen{padding:10px 8px;}
  /* カード：小型化して横スクロール前提のサイズに */
  .card{width:94px; height:146px; padding:5px 5px 6px; border-radius:8px;}
  .card .cost{width:22px; height:22px; font-size:12px; top:-7px; left:-7px;}
  .card .crar{min-width:16px; height:16px; font-size:9px; top:-6px; right:-5px; padding:0 4px;}
  .card .cname{font-size:10px; min-height:14px; margin-bottom:3px;}
  .card .cart{height:34px; margin-bottom:3px;}
  .card .cemo{font-size:19px;}
  .card .csym{font-size:9px;}
  .card .ctype{font-size:8px; margin-bottom:3px;}
  .card .cdesc{font-size:8.8px; line-height:1.45;}
  .card:hover{transform:none; box-shadow:none;}
  .card.selected{transform:translateY(-14px) scale(1.05);}
  #hand{min-height:176px; gap:6px; padding:20px 6px 4px;}
  /* 戦闘画面：縦スクロール可、敵カードも縮小 */
  #combat-screen{padding:4px 6px; overflow-y:auto;}
  #enemy-zone{gap:8px; min-height:120px;}
  .enemy{width:128px; padding:8px 6px;}
  .eglyph{min-height:56px;}
  .enemy.boss .eglyph{min-height:84px;}
  .ename{font-size:12px;}
  .intent{font-size:11px;}
  /* プレイヤーゾーン：2段組みに折り返し */
  #player-zone{flex-wrap:wrap; gap:8px 10px; padding:8px 2px;}
  #p-portrait{width:58px; height:58px;}
  #p-info{min-width:130px;}
  #p-name{font-size:12.5px;}
  #energy-orb{width:46px; height:46px; font-size:14px;}
  #pile-info{flex-direction:row; gap:12px; font-size:11px; order:5; flex:1;}
  #end-turn{order:6; padding:9px 14px; font-size:13px;}
  /* トップバー */
  #topbar{gap:8px; padding:6px 8px; font-size:11.5px; flex-wrap:wrap;}
  #deck-btn,#mute-btn{padding:4px 8px; font-size:11px; margin-left:4px;}
  .relic{width:24px; height:24px; font-size:12px;}
  .potion{width:27px; height:27px; font-size:13px; border-radius:7px;}
  #potion-row{margin-left:6px;}
  /* その他画面 */
  .title-main{font-size:30px;}
  .title-note{font-size:12px;}
  #turn-banner{font-size:20px; letter-spacing:.25em;}
  #overlay-box{padding:12px; max-height:86vh;}
  .opt-col{min-width:0; width:100%; max-width:340px;}
  button{padding:9px 14px; font-size:14px;}
}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <span class="name" id="tb-name"></span>
    <span>❤ <span class="hpv" id="tb-hp"></span></span>
    <span>◆ <span class="gold" id="tb-gold"></span></span>
    <span class="floorv" id="tb-floor"></span>
    <div id="relic-row"></div>
    <div id="potion-row"></div>
    <button id="deck-btn" onclick="showDeck()">デッキ</button>
    <button id="mute-btn" onclick="toggleMute(this)">🔊</button>
  </div>

  <div id="title-screen" class="screen on">
    <div class="title-sym" id="title-sprites"></div>
    <h1 class="title-main">ひがしやまクエスト</h1>
    <div class="title-sub">HIGASHIYAMA QUEST 〜まおうの とう〜</div>
    <div class="clear-stars" id="clear-stars"></div>
    <p class="title-note">
      レンジャーが たおしたはずの まおうが、そらたかくそびえる とうの ちょうじょうで ふっかつ!?<br>
      こんどは ひとりずつ、カードの ちからで とうに いどむ。<br>
      カードを あつめ、じぶんだけの デッキを きたえ、まおうの——そして その うえの やみの とうを のぼれ!
    </p>
    <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
      <button onclick="startGame('easy')" style="font-size:16px; padding:13px 24px;">やさしい</button>
      <button onclick="startGame('normal')" style="font-size:16px; padding:13px 24px; border-color:var(--gold);">ふつう</button>
      <button onclick="startGame('hard')" style="font-size:16px; padding:13px 24px; border-color:var(--red);">むずかしい</button>
    </div>
    <p class="small">やさしい：HP+10、てきが よわい ／ むずかしい：てきが つよくなるが、ゴールドが たくさん もらえる</p>
    <div id="pass-row">
      <input id="pass-input" maxlength="4" placeholder="あいことば">
      <button onclick="enterPass()" style="font-size:13px; padding:8px 14px;">いれる</button>
    </div>
    <div style="margin-top:6px;">
      <button onclick="showCardList()" style="font-size:13px; padding:8px 16px;">📖 カードずかん</button>
    </div>
    <div class="ver-tag" id="ver-tag"></div>
  </div>

  <div id="char-screen" class="screen">
    <h2>だれで とうに いどむ?</h2>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <div id="map-screen" class="screen">
    <h2 id="map-title"></h2>
    <div class="map-sub" id="map-sub"></div>
    <div id="map-view"></div>
  </div>

  <div id="combat-screen" class="screen">
    <div id="enemy-zone"></div>
    <div id="player-zone">
      <div id="p-portrait"></div>
      <div id="p-info">
        <div class="p-name-row"><span id="p-name"></span><button id="mech-help" onclick="showMechHelp()" title="とくぎの せつめい">?</button></div>
        <div class="hpbar" style="max-width:240px;"><div class="fill" id="p-hpfill"></div><div class="txt" id="p-hptxt"></div></div>
        <div class="statuses" id="p-statuses"></div>
      </div>
      <div id="energy-orb"></div>
      <div id="pile-info">
        <span style="cursor:pointer" onclick="showPile('draw')">やまふだ <b id="pi-draw">0</b></span>
        <span style="cursor:pointer" onclick="showPile('discard')">すてふだ <b id="pi-discard">0</b></span>
        <span style="cursor:pointer" onclick="showPile('exhaust')">しょうめつ <b id="pi-exhaust">0</b></span>
      </div>
      <button id="end-turn" onclick="endTurn()">ターンおわり</button>
    </div>
    <div id="hand"></div>
  </div>

  <div id="reward-screen" class="screen center-col"></div>
  <div id="rest-screen" class="screen center-col"></div>
  <div id="shop-screen" class="screen center-col"></div>
  <div id="event-screen" class="screen center-col"></div>
  <div id="end-screen" class="screen center-col"></div>
  <div id="cards-screen" class="screen"></div>

  <div id="overlay"><div id="overlay-box"><h3 id="overlay-title"></h3><div class="card-list" id="overlay-list"></div><button id="overlay-close" onclick="closeOverlay()">とじる</button></div></div>
  <div id="toast"></div>
  <div id="turn-banner"></div>
  <div id="confirm"><div id="confirm-box"><div id="confirm-msg"></div><div id="confirm-btns"></div></div></div>
</div>

const spriteCache = {};
function makeSprite(name, scale=4, flip=false){
  const key = name+"_"+scale+"_"+(flip?1:0);
  if(spriteCache[key]) return spriteCache[key];
  const def = SPRITES[name];
  if(!def) return null;
  const rows = def.rows, pal = def.pal, legs = def.legs;
  const w = rows[0].length, bodyH = rows.length;
  const legH = legs ? legs.h : 0;
  const frames = [];
  for(let f=0; f<2; f++){
    const c = document.createElement("canvas");
    c.width = w*scale; c.height = (bodyH+legH)*scale;
    const g = c.getContext("2d");
    const bob = (f===1 && legs) ? 1 : 0;
    for(let y=0;y<bodyH;y++){
      const row = rows[y];
      for(let x=0;x<w;x++){
        const ch = row[x];
        if(ch===".") continue;
        const col = pal[ch]; if(!col) continue;
        const px = flip ? (w-1-x) : x;
        g.fillStyle = col;
        g.fillRect(px*scale,(y+bob)*scale,scale,scale);
      }
    }
    if(legs){
      g.fillStyle = legs.c;
      const y0 = bodyH*scale;
      let x1 = legs.x1, x2 = legs.x2;
      if(flip){ const t=w-legs.x1-legs.w, t2=w-legs.x2-legs.w; x1=t2; x2=t; }
      if(f===0){
        g.fillRect(x1*scale, y0, legs.w*scale, legs.h*scale);
        g.fillRect((x2+1)*scale, y0, legs.w*scale, Math.max(1,(legs.h-1))*scale);
      }else{
        g.fillRect((x1+1)*scale, y0, legs.w*scale, Math.max(1,(legs.h-1))*scale);
        g.fillRect(x2*scale, y0, legs.w*scale, legs.h*scale);
      }
    }
    frames.push(c);
  }
  const out = {frames, w:w*scale, h:(bodyH+legH)*scale};
  spriteCache[key]=out;
  return out;
}
function spriteEl(name, scale=4, flip=false){
  const sp = makeSprite(name, scale, flip);
  const d = document.createElement("div");
  d.className = "spr";
  if(!sp){ d.textContent="?"; return d; }
  // キャッシュした canvas は使い回さず、都度コピー描画する
  for(let f=0; f<2; f++){
    const c = document.createElement("canvas");
    c.width = sp.frames[f].width; c.height = sp.frames[f].height;
    c.getContext("2d").drawImage(sp.frames[f],0,0);
    d.appendChild(c);
  }
  return d;
}

const AudioEng = {
  ctx:null, master:null, bgmGain:null, muted:false,
  bgmTimer:null, cur:null, step:0, nextT:0,
  init(){
    if(this.ctx) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain(); this.master.gain.value = .8;
      this.master.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = .3;
      this.bgmGain.connect(this.master);
      if(this.pending){ const p=this.pending; this.pending=null; this.playBGM(p); }
    }catch(e){}
  },
  resume(){ if(this.ctx && this.ctx.state==="suspended") this.ctx.resume(); },
  toggleMute(){
    this.muted=!this.muted;
    if(this.master) this.master.gain.value = this.muted?0:.8;
    return this.muted;
  },
  f(n){ return 440*Math.pow(2,(n-69)/12); },
  tone(n, t, dur, type, vol, dest, slide){
    if(!this.ctx||this.muted) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(this.f(n),t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,this.f(n+slide)), t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); g.connect(dest||this.master);
    o.start(t); o.stop(t+dur+.02);
  },
  noise(t,dur,vol,hp){
    if(!this.ctx||this.muted) return;
    const len=Math.floor(this.ctx.sampleRate*dur);
    const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=this.ctx.createBufferSource(); src.buffer=buf;
    const g=this.ctx.createGain(); g.gain.value=vol;
    const flt=this.ctx.createBiquadFilter(); flt.type=hp?"highpass":"lowpass"; flt.frequency.value=hp?3000:900;
    src.connect(flt); flt.connect(g); g.connect(this.master);
    src.start(t);
  },
  sfx(kind){
    if(!this.ctx) return;
    const t=this.ctx.currentTime;
    switch(kind){
      case "tap":    this.tone(88,t,.07,"square",.12); break;
      case "deploy": this.tone(72,t,.06,"square",.16); this.tone(79,t+.06,.09,"square",.16); break;
      case "hit":    this.noise(t,.08,.22); break;
      case "slash":  this.noise(t,.1,.18,true); this.tone(70,t,.08,"sawtooth",.1,null,-12); break;
      case "shoot":  this.tone(92,t,.09,"square",.1,null,-10); break;
      case "magic":  this.tone(84,t,.14,"triangle",.16,null,10); this.tone(91,t+.05,.14,"triangle",.13,null,8); break;
      case "heal":   this.tone(76,t,.12,"sine",.16); this.tone(83,t+.09,.14,"sine",.16); this.tone(88,t+.18,.2,"sine",.15); break;
      case "coin":   this.tone(93,t,.05,"square",.14); this.tone(98,t+.05,.14,"square",.14); break;
      case "wallet": this.tone(69,t,.06,"square",.15); this.tone(76,t+.06,.06,"square",.15); this.tone(81,t+.12,.14,"square",.15); break;
      case "boss":   this.tone(38,t,.5,"sawtooth",.28,null,-5); this.tone(31,t+.1,.6,"sawtooth",.25,null,-4); this.noise(t,.35,.2); break;
      case "thunder":this.noise(t,.28,.35); this.tone(40,t,.3,"sawtooth",.2,null,-10); break;
      case "crit":   this.tone(96,t,.06,"square",.15); this.tone(103,t+.05,.1,"square",.15); break;
      case "block":  this.tone(60,t,.08,"triangle",.14); this.tone(67,t+.05,.08,"triangle",.12); break;
      case "lose":   [60,56,53,48].forEach((n,i)=>this.tone(n,t+i*.22,.24,"triangle",.2)); break;
      case "win":    [72,76,79,84,79,84,88].forEach((n,i)=>this.tone(n,t+i*.13,.16,"square",.18)); this.tone(60,t,.9,"triangle",.15); break;
    }
  },
  tracks:{
    home:{ bpm:112, mel:[76,0,79,0, 81,79,76,0, 74,0,76,0, 72,0,0,0, 76,0,79,0, 84,0,81,0, 79,76,74,0, 72,0,0,0],
           bass:[48,0,55,0, 53,0,55,0, 50,0,57,0, 48,0,55,0, 48,0,55,0, 53,0,55,0, 50,0,57,0, 48,0,52,0], type:"triangle" },
    battle:{ bpm:150, mel:[72,72,0,76, 79,0,76,79, 81,0,79,76, 74,0,72,0, 72,72,0,76, 79,0,84,81, 79,81,84,0, 84,0,0,0],
           bass:[48,48,55,48, 53,53,60,53, 50,50,57,50, 55,55,55,53, 48,48,55,48, 53,53,60,53, 50,50,57,50, 48,48,48,0], type:"square" },
    boss:{ bpm:158, mel:[69,0,69,72, 75,0,72,69, 68,0,68,71, 74,0,71,68, 69,0,69,72, 75,0,77,75, 72,75,77,80, 81,0,0,0],
           bass:[45,45,45,45, 44,44,44,44, 41,41,41,41, 44,44,45,45, 45,45,45,45, 44,44,44,44, 41,41,43,43, 45,45,45,45], type:"square" }
  },
  playBGM(name){
    if(!this.ctx){ this.pending=name; return; }
    if(this.cur===name) return;
    this.stopBGM(); this.cur=name;
    const tr=this.tracks[name]; if(!tr) return;
    this.step=0; this.nextT=this.ctx.currentTime+.06;
    const stepDur=60/tr.bpm/2;
    this.bgmTimer=setInterval(()=>{
      if(this.muted) { this.nextT=this.ctx.currentTime+.06; return; }
      while(this.nextT < this.ctx.currentTime+.22){
        const i=this.step % tr.mel.length;
        const m=tr.mel[i], b=tr.bass[i];
        if(m) this.tone(m,this.nextT,stepDur*.95,tr.type,.13,this.bgmGain);
        if(b) this.tone(b,this.nextT,stepDur*.9,"triangle",.15,this.bgmGain);
        if(i%4===0) this.noise(this.nextT,.03,.05,true);
        if(i%8===4) this.noise(this.nextT,.05,.07);
        this.nextT+=stepDur; this.step++;
      }
    },90);
  },
  stopBGM(){ if(this.bgmTimer){clearInterval(this.bgmTimer); this.bgmTimer=null;} this.cur=null; }
};

/* むずかしさ調整: 初期カード(S)いがいの ブロック値を 底上げ（1マナ+1 / 2マナ+2）*/
Object.values(CARDS).forEach(card=>{
  if(card.rar==="S") return;
  const bump = card.cost===1 ? 1 : card.cost===2 ? 2 : 0;
  if(!bump) return;
  if(card.v  && typeof card.v.b ==="number") card.v.b  += bump;
  if(card.vu && typeof card.vu.b==="number") card.vu.b += bump;
});

function usePotion(id){
  if(!S) return;
  const p = (S.potions||[]).find(x=>x.id===id);
  if(!p || p.used) return;
  if(!S.combat || S.combat.busy){ toast("せんとうちゅうの じぶんの ターンに つかえるよ"); return; }
  POTIONS[id].use();
  p.used = true;
  AudioEng.sfx("magic");
  toast(`${POTIONS[id].name}を つかった!`);
  updateTopbar();
  renderCombat();
}

const ANCIENT_POOL = Object.keys(ANCIENTS);
function upgradeChoose(n, done){
  let left=n;
  (function step(){
    if(left<=0 || S.deck.every(c=>c.up)){ if(done)done(); return; }
    pickCardFromDeck(`きょうかする カードを えらぼう（のこり ${left}）`, c=>!c.up, card=>{
      card.up=true; left--; AudioEng.sfx("wallet"); step();
    }, ()=>{ if(done)done(); });   // キャンセルで うちきり
  })();
}
function gainAncient(id, cb){
  S.relics.push(id);
  const A=ANCIENTS[id];
  AudioEng.sfx("wallet");
  toast(`エンシェントレリック：${A.name}`);
  if(A.onGain && A.interactive){ updateTopbar(); A.onGain(cb); return; }
  if(A.onGain) A.onGain();
  updateTopbar();
  if(cb) cb();
}

/* ---------- あいことば(クリアきろく) ---------- */
const CHAR_ORDER = ["kento","taichi","nozomi","erika","yushi"];
const B36 = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let CLEARED1 = [false,false,false,false,false];   // ステージ1クリア
let CLEARED2 = [false,false,false,false,false];   // ステージ2クリア
function encodePass(){
  let s1=0, s2=0;
  CLEARED1.forEach((c,i)=>{ if(c) s1 |= (1<<i); });
  CLEARED2.forEach((c,i)=>{ if(c) s2 |= (1<<i); });
  const body = "Q" + B36[s1] + B36[s2];
  let sum = 0; for(const ch of body) sum += ch.charCodeAt(0);
  return body + B36[sum % 36];
}
function decodePass(p){
  p = (p||"").trim().toUpperCase();
  if(p[0]!=="Q") return null;
  if(p.length===3){                               // 旧v1形式(ステージ1のみ)
    let sum=0; for(const ch of p.slice(0,2)) sum += ch.charCodeAt(0);
    if(B36[sum % 36] !== p[2]) return null;
    const s1 = B36.indexOf(p[1]);
    if(s1 < 0 || s1 > 31) return null;
    return { c1:CHAR_ORDER.map((_,i)=>!!(s1 & (1<<i))), c2:[false,false,false,false,false] };
  }
  if(p.length===4){                               // v2形式(10bit)
    let sum=0; for(const ch of p.slice(0,3)) sum += ch.charCodeAt(0);
    if(B36[sum % 36] !== p[3]) return null;
    const s1 = B36.indexOf(p[1]), s2 = B36.indexOf(p[2]);
    if(s1 < 0 || s1 > 31 || s2 < 0 || s2 > 31) return null;
    return { c1:CHAR_ORDER.map((_,i)=>!!(s1 & (1<<i))), c2:CHAR_ORDER.map((_,i)=>!!(s2 & (1<<i))) };
  }
  return null;
}
function enterPass(){
  const v = $("pass-input").value;
  const r = decodePass(v);
  if(!r){ toast("あいことばが ちがうみたい…"); return; }
  CLEARED1 = r.c1; CLEARED2 = r.c2;
  AudioEng.sfx("wallet");
  toast("あいことばを おもいだした!");
  renderTitle();
}

}

/* ---------- マップ（ルート分岐） ----------
   スタート(1マス) → 3ルート分岐(各3マス一本道) → 合流(1マス) → …をくり返し、
   さいごに ボス。各ステージ ちょうど14マス（ボス=14/28かい）。
   ルートの さきの みちも すべて みえる（せんとうは さけられない設計）。 */
const NODE_LABEL = {
  battle:{glyph:"⚔️",label:"たたかい"},
  elite:{glyph:"🔥",label:"つよてき"},
  rest:{glyph:"⛺",label:"やすみ"},
  shop:{glyph:"🏪",label:"みせ"},
  event:{glyph:"❓",label:"？"},
  boss:{glyph:"👿",label:"ボス"}
};
function buildMap(stage){
  /* むずかしいも マップは 通常と同じ（難易度は てきの つよさで つける）。
     対戦マスを すこし へらし ？マスを ふやした（イベントで きょうか/パワー入手が できる）。 */
  const branch = lanes => ({ kind:"branch", chosen:-1,
    lanes: shuffle(lanes).map(L=>({ name:L.name, nodes:L.nodes.map(t=>({t,done:false})) })) });
  const single = t => ({ kind:"single", node:{t,done:false} });
  return [
    single("battle"),                                           // スタート（かならず たたかい）
    branch([
      {name:"せんとうの みち", nodes:["battle","battle","event"]},
      {name:"たからの みち",   nodes:["event","shop","battle"]},
      {name:"けものの みち",   nodes:["event","battle","battle"]}
    ]),
    single("rest"),                                             // 合流1（やすみ・合流ポイント）
    branch([
      {name:"しれんの みち",   nodes:["battle","elite","battle"]},
      {name:"ぼうけんの みち", nodes:["battle","event","battle"]},
      {name:"あきないの みち", nodes:["battle","shop","battle"]}
    ]),
    single("shop"),                                             // 合流2
    branch([
      {name:"やみの みち",     nodes:["elite","battle","battle"]},
      {name:"けわしい みち",   nodes:["battle","battle","event"]},
      {name:"うかいの みち",   nodes:["shop","event","battle"]}
    ]),
    single("rest"),                                             // ボスまえの やすみ
    single("boss")                                             // ボス（14 / 28かい）
  ];
}
function startStage(stage){
  S.floor = (stage-1)*14;                                       // ステージ1=0 / ステージ2=14 から
  S.map = { stage, cols:buildMap(stage), ci:0, lane:-1, li:0 };
  showMap();
}
function nodeChip(node, ci, laneIdx, ni){
  const M=S.map;
  const el=document.createElement("div");
  const info=NODE_LABEL[node.t];
  let reachable=false;
  if(ci===M.ci){
    const col=M.cols[ci];
    if(col.kind==="single") reachable = !node.done;
    else reachable = (M.lane===-1) ? (ni===0) : (laneIdx===M.lane && ni===M.li);
  }
  el.className = "map-node " + (node.t==="boss"?"boss ":"") + (node.done?"done":reachable?"now":"future");
  const glyph = (node.t==="boss" && M.stage===2) ? "😈" : info.glyph;
  el.innerHTML = `<span class="mn-glyph">${glyph}</span><span class="mn-label">${info.label}</span>`;
  if(reachable) el.onclick=()=>{ AudioEng.sfx("tap"); playNode(ci, laneIdx); };
  return el;
}
function showMap(){
  const M=S.map;
  AudioEng.playBGM("home");
  if(M.stage===2){
    $("map-title").textContent = "やみのとう";
    $("map-sub").textContent = "ルートを えらんで のぼれ。この さきの みちも みえるよ";
  } else {
    $("map-title").textContent = "まおうの とう";
    $("map-sub").textContent = "ルートを えらぼう。えらんだ みちは 一本道、たたかいは さけられない!";
  }
  const host=$("map-view"); host.className="map-view"; host.innerHTML="";
  M.cols.forEach((col,ci)=>{
    const colEl=document.createElement("div");
    if(col.kind==="single"){
      colEl.className="map-col single";
      colEl.appendChild(nodeChip(col.node, ci, null, 0));
    } else {
      colEl.className="map-col branch";
      col.lanes.forEach((lane,laneIdx)=>{
        const laneEl=document.createElement("div"); laneEl.className="map-lane";
        if(col.chosen>=0 && col.chosen!==laneIdx) laneEl.classList.add("laneskip");
        const head=document.createElement("div"); head.className="lane-name"; head.textContent=lane.name;
        laneEl.appendChild(head);
        lane.nodes.forEach((node,ni)=>laneEl.appendChild(nodeChip(node, ci, laneIdx, ni)));
        colEl.appendChild(laneEl);
      });
    }
    host.appendChild(colEl);
  });
  updateTopbar();
  show("map-screen");
  setTimeout(()=>{ const cur=host.querySelector(".map-node.now"); if(cur && cur.scrollIntoView) cur.scrollIntoView({block:"center",behavior:"smooth"}); }, 40);
}
function playNode(ci, laneIdx){
  const M=S.map, col=M.cols[ci];
  let t;
  if(col.kind==="single"){ t=col.node.t; }
  else {
    if(M.lane===-1){ M.lane=laneIdx; col.chosen=laneIdx; }       // ルート確定
    t = col.lanes[M.lane].nodes[M.li].t;
  }
  S.floor++;
  enterNode(t);
}
function afterNode(){
  const M=S.map, col=M.cols[M.ci];
  if(col.kind==="single"){ col.node.done=true; M.ci++; M.lane=-1; M.li=0; }
  else {
    col.lanes[M.lane].nodes[M.li].done=true;
    M.li++;
    if(M.li >= col.lanes[M.lane].nodes.length){ M.ci++; M.lane=-1; M.li=0; }
  }
  showMap();
}
function enterNode(t){
  const stage = stageOf(S.floor);
  if(t==="battle"){
    let group;
    if(stage===2) group = S.floor<=20 ? pick(POOL_S2) : pick(POOL_S2_HARD);
    else group = S.floor<=5 ? pick(POOL_EASY) : pick(POOL_HARD);
    startCombat(group, "battle");
  }
  else if(t==="elite") startCombat(pick(stage===2 ? POOL_S2_ELITE : POOL_ELITE), "elite");
  else if(t==="boss") startCombat(S.floor===28 ? ["darkmaou"] : ["maou"], "boss");
  else if(t==="rest") restScreen();
  else if(t==="shop") shopScreen();
  else if(t==="event") eventScreen();
}

/* ================= せんとう ================= */
function startCombat(enemyIds, kind){
  const stage = stageOf(S.floor);
  /* ステージ2は てきの きそちを たかくするため、かいそうスケールを リセット */
  const scale = 1 + (stage===2 ? Math.max(0,S.floor-15) : Math.max(0,S.floor-1))*0.03;
  const enemies = enemyIds.map((id,i)=>{
    const E=ENEMIES[id];
    const s2boost = (stage===2 && id==="ninja") ? 1.2 : 1;   // やみにんじゃ(流用)は +20%
    const hp = Math.round((E.hp[0]+rnd(E.hp[1]-E.hp[0]+1)) * (E.boss?1:scale) * s2boost * DIFF.eHp);
    return {id, uid:i, name:E.name, spr:E.spr, sprScale:E.scale, hp, maxHp:hp, blk:0,
      st:{}, turn:0, boss:!!E.boss, elite:!!E.elite, move:null, enraged:false};
  });
  S.combat = {
    kind, enemies, turn:0, energyMax:3 + (hasRelic("lamp")?1:0) + (hasRelic("anc_mana")?1:0),
    energy:0, hand:[], draw:shuffle(S.deck.map(c=>({...c}))), discard:[], exhaust:[],
    blk:0, st:{}, faith:0, wisdom:0, played:0, stance:null, selected:null,
    crit: S.ch.id==="erika" ? 15 : 0, critMul:2,
    negate:0, dmgTaken:0, freeUsed:false, fbUsed:false
  };
  const C=S.combat;
  if(hasRelic("toolbox") && S.ch.id==="taichi") C.wisdom=2;
  if(hasRelic("ochoko") && S.ch.id==="yushi") C.stance="calm";
  if(hasRelic("photo")) C.blk=6;
  if(hasRelic("penlight")||hasRelic("ojiichan")) C.st.str=(C.st.str||0)+ (hasRelic("penlight")?1:0) + (hasRelic("ojiichan")?1:0);
  if(hasRelic("doorbell")) enemies.forEach(e=>e.st.weak=(e.st.weak||0)+1);
  if(hasRelic("anc_berserk")){ C.st.str=(C.st.str||0)+3; C.st.dex=(C.st.dex||0)+3; }   // エンシェント：狂戦士
  if(hasRelic("anc_heal8")) S.hp=Math.min(S.maxHp, S.hp+8);                              // エンシェント：命の聖杯
  enemies.forEach(e=>chooseMove(e));
  if(kind==="boss"){ AudioEng.sfx("boss"); AudioEng.playBGM("boss"); }
  else AudioEng.playBGM("battle");
  show("combat-screen");
  startPlayerTurn();
}
function chooseMove(e){
  const E=ENEMIES[e.id];
  e.move = E.moves[E.ai(e, e.turn)];
  e.turn++;
}
function showBanner(txt, foe){
  const b=$("turn-banner");
  b.textContent=txt;
  b.className=foe?"foe":"";
  void b.offsetWidth;
  b.classList.add("show");
}
function startPlayerTurn(){
  const C=S.combat;
  C.turn++;
  showBanner(C.turn===1 ? `${S.ch.name}の ターン` : "きみの ターン");
  C.blk = 0;
  C.energy = C.energyMax + (hasRelic("clock") && C.turn===1 ? 1 : 0);
  C.played = 0;
  C.fbUsed = false; C.dmgTaken = 0;                       // まいターン リセット(こだいの盾/だいちの鎧)
  if(hasRelic("lamp")) damagePlayer(1, true);
  if(hasRelic("anc_berserk")) damagePlayer(1, true);      // きょうせんし：まいターン HP-1
  C.powers = C.powers||{};
  if(C.powers.star_utahime){ C.faith+=1; S.hp=Math.min(S.maxHp,S.hp+(C.powers.star_utahime-1)); }
  if(C.powers.tensai_ou) C.wisdom += C.powers.tensai_ou;
  if(C.powers.horoyoi_kenja) C.blk += C.powers.horoyoi_kenja;
  if(C.powers.densetsu_senshi) C.st.str=(C.st.str||0)+C.powers.densetsu_senshi;
  if(C.powers.shippu_mode) C.played += C.powers.shippu_mode;
  if(C.powers.crit_gain) C.crit += C.powers.crit_gain;    // ファンサりつ 毎ターン(まいにちレッスン)
  /* むずかしいモード：ボスは 3ターンごとに きんりょく+1 */
  if(DIFF.key==="hard" && C.kind==="boss" && C.turn%3===0){
    C.enemies.forEach(e=>{ if(e.hp>0 && e.boss) e.st.str=(e.st.str||0)+1; });
    toast("ボスの ちからが たかまっている! (きんりょく+1)");
  }
  /* ドローン：ターンかいしじに ランダムな てきへ はつめいダメージ */
  if(C.powers.drone){
    const alive=aliveEnemies();
    if(alive.length){
      const tgt=pick(alive);
      const dmg=Math.max(0, C.wisdom*C.powers.drone.mul + C.powers.drone.flat);
      if(dmg>0) dealToEnemy(tgt, dmg);
      if(aliveEnemies().length===0){ renderCombat(); setTimeout(victory,500); return; }
    }
  }
  const n = 5 + (hasRelic("sneaker") && S.ch.id==="kento" ? 1 : 0);
  drawCards(n);
  C.dealAnim = true;
  renderCombat();
}
function drawCards(n){
  const C=S.combat;
  for(let i=0;i<n;i++){
    if(C.draw.length===0){
      if(C.discard.length===0) break;
      C.draw = shuffle(C.discard); C.discard=[];
    }
    C.hand.push(C.draw.pop());
  }
}
function pStr(){ return (S.combat.st.str||0); }
function calcPlayerDmg(base, perHitBonus=0){
  const C=S.combat;
  let d = base + pStr() + perHitBonus + (C.powers && C.powers.shippu_kensei ? C.powers.shippu_kensei : 0);
  if(C.stance==="wrath") d*=2;
  if(C.st.weak) d*=0.75;
  return Math.max(0, Math.floor(d));
}
function dealToEnemy(e, dmg){
  const C=S.combat;
  let isCrit=false;
  if(C.crit>0 && rnd(100) < C.crit){ dmg = Math.floor(dmg*(C.critMul||2)); isCrit=true; }
  if(e.st.vuln) dmg = Math.floor(dmg*1.5);
  const absorbed = Math.min(e.blk, dmg);
  e.blk -= absorbed; dmg -= absorbed;
  e.hp -= dmg;
  /* やみのまおう いかりギミック：HP50%いかで きんりょく+3(1かいだけ) */
  if(e.hp>0 && e.id==="darkmaou" && !e.enraged && e.hp<=e.maxHp*0.5){
    e.enraged=true; e.st.str=(e.st.str||0)+3;
    AudioEng.sfx("boss");
    toast("やみのまおうが しんの ちからを かいほうした! (きんりょく+3)");
  }
  if(isCrit && dmg>0){
    AudioEng.sfx("crit");
    floatText(`e-${e.uid}`, `ファンサ☆-${dmg}`, "#ffd94d");
  } else {
    floatText(`e-${e.uid}`, dmg>0?`-${dmg}`:"ガード", dmg>0?"#ff8a7a":"#7fb2e5");
  }
  if(e.hp<=0){
    e.hp=0; e.dying=true;
    setTimeout(()=>{ e.dying=false; if(S.combat) renderCombat(); }, 560);
  } else {
    setTimeout(()=>{
      const el=$(`e-${e.uid}`);
      if(el){ el.classList.remove("hit"); void el.offsetWidth; el.classList.add("hit"); }
    }, 30);
  }
}
function damagePlayer(dmg, pierce=false){
  const C=S.combat;
  let noted=false;
  if(!pierce){
    const absorbed=Math.min(C.blk,dmg); C.blk-=absorbed; dmg-=absorbed;
    if(dmg>0 && C.negate>0){ C.negate--; dmg=0; floatText("p-portrait","バリア!","#8ad4f5"); noted=true; }               // エンシェントバリア
    else if(dmg>0 && hasRelic("anc_negate5")){ C.hitc=(C.hitc||0)+1; if(C.hitc%5===0){ dmg=0; floatText("p-portrait","むこうか!","#8ad4f5"); noted=true; } }  // 5かいごと むこうか
    if(dmg>0 && hasRelic("anc_cap20")){ const room=Math.max(0,20-(C.dmgTaken||0)); if(dmg>room) dmg=room; C.dmgTaken=(C.dmgTaken||0)+dmg; }  // 1ターン ダメージ上限20
  }
  if(dmg>0){
    S.hp-=dmg;
    AudioEng.sfx("hit");
    floatText("p-portrait", `-${dmg}`, "#ff8a7a");
    $("p-portrait").classList.remove("shake"); void $("p-portrait").offsetWidth;
    $("p-portrait").classList.add("shake");
    if(!pierce) screenShake();                          // てきの こうげきが ヒット → 画面ゆれ
  } else if(!pierce && !noted){ AudioEng.sfx("block"); floatText("p-portrait","ガード","#7fb2e5"); }
  if(S.hp<=0){ S.hp=0; setTimeout(defeat, 600); }
}
function screenShake(){
  const a=$("app"); if(!a) return;
  a.classList.remove("shakescr"); void a.offsetWidth; a.classList.add("shakescr");
  setTimeout(()=>a.classList.remove("shakescr"), 420);
}
function pulse(cls){
  setTimeout(()=>{
    const p=$("p-portrait");
    p.classList.remove(cls); void p.offsetWidth; p.classList.add(cls);
    setTimeout(()=>p.classList.remove(cls), 650);
  }, 30);
}
function floatText(elId, txt, color){
  setTimeout(()=>{
    const host=$(elId);
    if(!host) return;
    const f=document.createElement("div");
    f.className="floaty"; f.textContent=txt; f.style.color=color;
    f.style.left=(10+rnd(40))+"%"; f.style.top="10%";
    host.style.position="relative"; host.appendChild(f);
    setTimeout(()=>f.remove(), 850);
  }, 30);
}
/* かまえ */
function setStance(st){
  const C=S.combat;
  if(st==="exit") st=null;
  if(C.stance===st) return;
  if(C.stance==="calm" && st!=="calm"){ C.energy+=2; toast("めいそうから めが さめて 気が みちる (+2)"); }
  C.stance = st;
  if(C.powers && C.powers.yusha_sakazuki) drawCards(C.powers.yusha_sakazuki);   // かまえ変更で ドロー
}

/* ---------- カードプレイ ---------- */
function canPlay(card){
  const C=S.combat;
  return cardCost(card) <= C.energy;
}
function cardCost(card){ return CARDS[card.id].cost; }
function aliveEnemies(){ return S.combat.enemies.filter(e=>e.hp>0); }

function clickCard(idx){
  const C=S.combat;
  const card=C.hand[idx];
  if(!canPlay(card)){ AudioEng.sfx("tap"); toast("気が たりない!"); return; }
  const def=CARDS[card.id];
  const needsTarget = def.type==="atk" && !def.all && aliveEnemies().length>1;
  if(needsTarget){
    if(C.selected===idx){ C.selected=null; }
    else { C.selected=idx; toast("こうげきする あいてを えらぼう"); }
    renderCombat();
    return;
  }
  const tgt = def.type==="atk" ? aliveEnemies()[0] : null;
  flyCard(idx, tgt, def.type);
  playCard(idx, tgt);
}
function flyCard(idx, target, type){
  const src = $("hand").children[idx];
  if(!src) return;
  const r = src.getBoundingClientRect();
  const clone = src.cloneNode(true);
  clone.classList.add("fly-card");
  clone.classList.remove("selected","deal","unplayable");
  clone.style.left=r.left+"px"; clone.style.top=r.top+"px";
  clone.style.width=r.width+"px"; clone.style.height=r.height+"px";
  document.body.appendChild(clone);
  let dest;
  if(type==="atk" && target){
    const te=$(`e-${target.uid}`);
    dest = te ? te.getBoundingClientRect() : {left:innerWidth/2, top:120, width:0, height:0};
  } else {
    dest = $("p-portrait").getBoundingClientRect();
  }
  requestAnimationFrame(()=>{
    const dx = dest.left+dest.width/2 - (r.left+r.width/2);
    const dy = dest.top+dest.height/2 - (r.top+r.height/2);
    clone.style.transform=`translate(${dx}px,${dy}px) scale(.35) rotate(${type==="atk"?14:-8}deg)`;
    clone.classList.add("gone");
  });
  setTimeout(()=>clone.remove(), 480);
}
function clickEnemy(uid){
  const C=S.combat;
  if(C.selected===null) return;
  const e=C.enemies.find(x=>x.uid===uid);
  if(!e || e.hp<=0) return;
  const idx=C.selected; C.selected=null;
  flyCard(idx, e, "atk");
  playCard(idx, e);
}
function playCard(idx, target){
  const C=S.combat;
  const card=C.hand[idx], def=CARDS[card.id], v=cv(card);
  let cost=def.cost;
  if(hasRelic("anc_free1") && !C.freeUsed){ C.freeUsed=true; if(cost>0){ cost=0; toast("はやわざ! さいしょの 1まいは マナ0"); } }   // エンシェント：はやわざ
  C.energy -= cost;
  if(cost>0){
    setTimeout(()=>{ const o=$("energy-orb"); o.classList.add("spend"); setTimeout(()=>o.classList.remove("spend"),160); }, 30);
  }
  C.hand.splice(idx,1);
  C.played++;

  /* こうかおん */
  if(def.thunder) AudioEng.sfx("thunder");
  else if(def.type==="atk") AudioEng.sfx(v.hits>1 ? "slash" : "hit");
  else if(def.type==="pow") AudioEng.sfx("magic");
  else if(v.h) AudioEng.sfx("heal");
  else AudioEng.sfx("deploy");

  if(def.stance) setStance(def.stance);

  if(def.type==="atk"){
    let hits = v.hits || (card.id==="renzoku_bakudan" ? Math.min(C.wisdom,7) : 1);
    if(card.id==="renzoku_bakudan" && hits===0) hits=1;
    let base = v.d || 0;
    if(v.fm!==undefined){ base = v.d + C.faith*v.fm; C.faith=0; }
    if(v.wm!==undefined){ base = v.d + C.wisdom*v.wm; }
    if(v.dm!==undefined){ base = v.dm * C.played; }
    if(v.wall!==undefined){ base = C.wisdom*v.wall; C.wisdom=0; }   // はつめい 全消費
    if(v.fall!==undefined){ base = C.faith*v.fall; C.faith=0; }     // おんぷ 全消費
    if(v.fge!==undefined && C.faith>=3) base += v.fge;              // おんぷ3いじょう
    if(v.wrb!==undefined && C.stance==="wrath") base += v.wrb;      // ほろよいボーナス
    if(v.cab!==undefined && C.stance==="calm") base += v.cab;       // めいそうボーナス
    let perHit = 0;
    if(v.combo3!==undefined && C.played>=3) perHit += v.combo3;     // コンボ3まいいじょう
    const targets = def.all ? aliveEnemies() : [target||aliveEnemies()[0]];
    for(let h=0; h<hits; h++){
      targets.forEach(t=>{ if(t.hp>0) dealToEnemy(t, calcPlayerDmg(base, perHit)); });
    }
    if(v.vn) targets.forEach(t=>{ if(t.hp>0) t.st.vuln=(t.st.vuln||0)+v.vn; });
  }
  let blk = 0;
  if(v.b) blk += v.b;
  if(v.bm) blk += v.bm * C.played;
  if(v.cb && C.stance==="calm") blk += v.cb;
  if(v.wb) blk += C.wisdom * v.wb;                 // はつめい×n ブロック
  if(blk>0){
    blk += (C.st.dex||0);                                                              // すばやさ ぶん 上乗せ
    if(hasRelic("anc_block2x") && C.turn%2===0 && !C.fbUsed){ blk*=2; C.fbUsed=true; }  // 2ターンごと 最初のブロック2倍
    C.blk += blk; pulse("blockp");
  }
  if(v.f) C.faith += v.f;
  if(v.w) C.wisdom += v.w;
  if(v.pl) C.played += v.pl;                        // コンボ(つかったカードかず)を ふやす
  if(v.e) C.energy += v.e;
  if(v.cr && def.type!=="pow") C.crit += v.cr;
  if(v.h){ S.hp = Math.min(S.maxHp, S.hp + v.h); pulse("healp"); floatText("p-portrait", `+${v.h}`, "#8ce6a0"); }
  if(v.sd){ damagePlayer(v.sd, true); if(!S.combat || S.hp<=0) return; }
  if(v.s && def.type!=="pow") C.st.str=(C.st.str||0)+v.s;
  if(v.wk){ (def.all?aliveEnemies():[target||aliveEnemies()[0]]).forEach(t=>{ if(t) t.st.weak=(t.st.weak||0)+v.wk; }); }
  if(v.vn && def.type!=="atk"){ (def.all?aliveEnemies():[target||aliveEnemies()[0]]).forEach(t=>{ if(t&&t.hp>0) t.st.vuln=(t.st.vuln||0)+v.vn; }); }  // 攻撃いがいで ぜいじゃく(デバフカード)
  let dr = v.dr||0;
  if(v.cdr && C.stance==="calm") dr += v.cdr;
  if(def.special==="rinne" && C.discard.length){
    const i=rnd(C.discard.length);
    C.hand.push(C.discard.splice(i,1)[0]);
  }
  if(def.special==="negate2"){ C.negate=(C.negate||0)+2; floatText("p-portrait","バリア×2","#8ad4f5"); }   // エンシェントバリア
  if(def.type==="pow"){
    C.powers = C.powers||{};
    if(card.id==="spotlight"){ C.st.str=(C.st.str||0)+v.s; }
    else if(card.id==="chozetsu_fansa"){ C.crit += v.cr; }
    else if(card.id==="star_utahime") C.powers.star_utahime = v.n;
    else if(card.id==="tensai_ou") C.powers.tensai_ou = (C.powers.tensai_ou||0)+v.w;
    else if(card.id==="horoyoi_kenja") C.powers.horoyoi_kenja = (C.powers.horoyoi_kenja||0)+v.b;
    else if(card.id==="shippu_kensei") C.powers.shippu_kensei = (C.powers.shippu_kensei||0)+v.n;
    else if(card.id==="densetsu_senshi") C.powers.densetsu_senshi = (C.powers.densetsu_senshi||0)+v.s;
    else if(card.id==="shippu_mode") C.powers.shippu_mode = (C.powers.shippu_mode||0)+v.n;
    else if(card.id==="audience") C.powers.audience = (C.powers.audience||0)+v.n;
    else if(card.id==="drone") C.powers.drone = {mul:v.dmul, flat:(C.powers.drone?C.powers.drone.flat:0)+v.dadd};
    else if(card.id==="kanko_chikara") C.critMul = v.critmul;
    else if(card.id==="yusha_sakazuki") C.powers.yusha_sakazuki = v.n;
    else if(card.id==="hitamuki_lesson") C.powers.shippu_mode = (C.powers.shippu_mode||0)+v.n;
    else if(card.id==="jido_kenkyusho") C.powers.tensai_ou = (C.powers.tensai_ou||0)+v.w;
    else if(card.id==="kuchizusamu") C.powers.star_utahime = v.n;
    else if(card.id==="mainichi_lesson") C.powers.crit_gain = (C.powers.crit_gain||0)+v.cr;
    else if(card.id==="keiko_no_hibi") C.powers.horoyoi_kenja = (C.powers.horoyoi_kenja||0)+v.bp;
    C.exhaust.push(card);
  } else if(def.ex){
    C.exhaust.push(card);
  } else {
    C.discard.push(card);
  }
  if(dr>0) drawCards(dr);
  if(!S.combat || S.hp<=0) return;
  if(aliveEnemies().length===0){ renderCombat(); setTimeout(victory, 500); return; }
  renderCombat();
}

/* ---------- てきターン ---------- */
function endTurn(){
  const C=S.combat;
  if(!C || C.busy) return;
  C.busy = true;
  C.selected=null;
  if(C.powers && C.powers.audience) C.faith += C.powers.audience;   // ターンしゅうりょうじ おんぷ+n
  C.discard.push(...C.hand); C.hand=[];
  renderCombat();
  if(aliveEnemies().length) showBanner("てきの ターン", true);
  const acts = aliveEnemies();
  let i=0;
  (function step(){
    if(!S.combat || S.hp<=0) return;
    if(i>=acts.length){
      const dec=o=>{ if(o.weak)o.weak--; if(o.vuln)o.vuln--; };
      dec(C.st); C.enemies.forEach(e=>dec(e.st));
      C.enemies.forEach(e=>{ if(e.hp>0){ e.blk=0; chooseMove(e); } });
      C.busy=false;
      startPlayerTurn();
      return;
    }
    const e=acts[i++];
    if(e.hp>0){ C.actingUid=e.uid; doEnemyMove(e); }
    if(!S.combat || S.hp<=0) return;
    renderCombat();
    C.actingUid=null;
    setTimeout(step, 550);
  })();
}
function enemyDmg(e, base){
  let d = base + (e.st.str||0);
  if(e.st.weak) d*=0.75;
  d *= DIFF.eDmg;
  const C=S.combat;
  if(!C) return Math.max(0,Math.floor(d));
  if(C.st.vuln) d*=1.5;
  if(C.stance==="wrath") d*=2;
  return Math.max(0, Math.floor(d));
}
function doEnemyMove(e){
  const m=e.move, C=S.combat;
  if(m.t==="atk") damagePlayer(enemyDmg(e,m.d));
  else if(m.t==="multi"){ for(let h=0;h<m.hits;h++){ if(!S.combat||S.hp<=0) break; damagePlayer(enemyDmg(e,m.d)); } }
  else if(m.t==="blk") e.blk+=m.b;
  else if(m.t==="buff") e.st.str=(e.st.str||0)+m.s;
  else if(m.t==="debuff"){ if(m.wk)C.st.weak=(C.st.weak||0)+m.wk; if(m.vn)C.st.vuln=(C.st.vuln||0)+m.vn; }
  else if(m.t==="atk_debuff"){ damagePlayer(enemyDmg(e,m.d)); if(m.wk)C.st.weak=(C.st.weak||0)+m.wk; if(m.vn)C.st.vuln=(C.st.vuln||0)+m.vn; }
  else if(m.t==="blk_buff"){ e.blk+=m.b; e.st.str=(e.st.str||0)+m.s; }
  else if(m.t==="blk_atk"){ e.blk+=m.b; damagePlayer(enemyDmg(e,m.d)); }
}

/* ================= びょうが ================= */
const TYPE_LABEL={atk:"アタック",skl:"スキル",pow:"パワー"};
const TYPE_COLOR={atk:"var(--atk)",skl:"var(--skl)",pow:"var(--pow)"};
function cardEl(card, opts={}){
  const def=CARDS[card.id], v=cv(card);
  const chSym = def.ch==="none" ? "✦" : CHARS[def.ch].sym;
  const chColor = def.ch==="none" ? "#9a8fb8" : CHARS[def.ch].cc;
  const el=document.createElement("div");
  el.className="card"+(card.up?" upg":"");
  el.style.setProperty("--cc", TYPE_COLOR[def.type]);
  el.style.borderColor = chColor;
  const bg = ART_BG[def.ch]||ART_BG.none;
  const RAR={S:"はじめ",C:"C",U:"U",R:"R"};
  el.innerHTML = `<div class="cost">${def.cost}</div>
    <div class="crar rar-${def.rar}" title="レアリティ">${RAR[def.rar]||def.rar}</div>
    <div class="cname">${cname(card)}</div>
    <div class="cart" style="--artg1:${bg[0]};--artg2:${bg[1]}">
      <span class="cemo">${CARD_ART[card.id]||"✦"}</span>
      <span class="csym" style="color:${chColor}">${chSym}</span>
    </div>
    <div class="ctype">${TYPE_LABEL[def.type]}</div>
    <div class="cdesc"><span>${def.desc(v)}</span></div>`;
  if(opts.onclick) el.onclick=opts.onclick;
  return el;
}
function stEl(list, host){
  host.innerHTML="";
  const NAMES={str:["きんりょく","こうげきりょくが あがる","buff"],dex:["すばやさ","ブロックが ふえる","buff"],weak:["すいじゃく","あたえるダメージ-25%","debuff"],vuln:["ぜいじゃく","うけるダメージ+50%","debuff"]};
  for(const k in list){
    if(!list[k]) continue;
    const [n,tip,cls]=NAMES[k];
    const s=document.createElement("span");
    s.className="st "+cls; s.textContent=`${n} ${list[k]}`; s.title=tip;
    host.appendChild(s);
  }
}
function intentText(e){
  const m=e.move;
  if(!m) return "";
  const d = m.d!==undefined ? enemyDmg(e,m.d) : null;
  let s = m.txt+"：";
  if(m.t==="atk"||m.t==="atk_debuff") s+=`⚔ <b>${d}</b>`;
  if(m.t==="multi") s+=`⚔ <b>${d}×${m.hits}</b>`;
  if(m.t==="blk") s+=`🛡 ${m.b}`;
  if(m.t==="buff") s+=`✦ きょうか`;
  if(m.t==="debuff") s+=`💫 じゃくたい`;
  if(m.t==="atk_debuff") s+=` +💫`;
  if(m.t==="blk_buff") s+=`🛡${m.b} ✦`;
  if(m.t==="blk_atk") s+=`🛡${m.b} ⚔<b>${d}</b>`;
  return s;
}
function renderCombat(){
  const C=S.combat; if(!C) return;
  updateTopbar();
  const ez=$("enemy-zone"); ez.innerHTML="";
  C.enemies.forEach(e=>{
    const el=document.createElement("div");
    let cls="enemy"+(e.boss?" boss":"")+(C.selected!==null?" targetable":"");

    el.className=cls;
    el.id=`e-${e.uid}`;
    el.innerHTML=`<div class="eglyph"></div>
      <div class="ename">${e.elite?"🔥 ":""}${e.boss?"👿 ":""}${e.name}</div>
      <div class="intent">${intentText(e)}</div>
      <div class="hpbar">${e.blk>0?`<div class="blkfill"></div>`:""}<div class="fill" style="width:${e.hp/e.maxHp*100}%"></div><div class="txt">${e.hp}/${e.maxHp}${e.blk>0?` 🛡${e.blk}`:""}</div></div>
      <div class="statuses"></div>`;
    el.querySelector(".eglyph").appendChild(spriteEl(e.spr, Math.max(2, e.sprScale-(MOBILE?1:0)), true));
    stEl(e.st, el.querySelector(".statuses"));
    el.onclick=()=>clickEnemy(e.uid);

  });
  const pp=$("p-portrait");
  if(!pp.dataset.spr || pp.dataset.spr!==S.ch.spr){
    pp.innerHTML=""; pp.dataset.spr=S.ch.spr;
    pp.appendChild(spriteEl(S.ch.spr, MOBILE?3:4));
  }
  pp.style.borderColor = S.ch.cc;
  let extra=[];
  if(S.ch.id==="nozomi") extra.push(`♪おんぷ ${C.faith}`);
  if(S.ch.id==="taichi") extra.push(`💡はつめい ${C.wisdom}`);
  if(S.ch.id==="kento") extra.push(`👊コンボ ${C.played}`);
  if(S.ch.id==="erika") extra.push(`☆ファンサ ${C.crit}%`);
  if(S.ch.id==="yushi") extra.push(C.stance==="calm"?"かまえ：めいそう":C.stance==="wrath"?"かまえ：ほろよい":"かまえ：なし");
  if(C.blk>0) extra.push(`🛡 ${C.blk}`);
  $("p-name").innerHTML = `${S.ch.name}　<span style="color:${S.ch.cc}">${extra.join("　")}</span>`;
  $("p-hpfill").style.width = (S.hp/S.maxHp*100)+"%";
  $("p-hptxt").textContent = `${S.hp}/${S.maxHp}`;
  stEl(C.st, $("p-statuses"));
  $("energy-orb").textContent = `${C.energy}/${C.energyMax}`;
  $("pi-draw").textContent=C.draw.length;
  $("pi-discard").textContent=C.discard.length;
  $("pi-exhaust").textContent=C.exhaust.length;
  const h=$("hand"); h.innerHTML="";
  C.hand.forEach((card,i)=>{
    const el=cardEl(card,{onclick:()=>clickCard(i)});
    if(!canPlay(card)) el.classList.add("unplayable");
    if(C.selected===i) el.classList.add("selected");
    if(C.dealAnim){ el.classList.add("deal"); el.style.animationDelay=(i*70)+"ms"; }
    h.appendChild(el);
  });
  C.dealAnim = false;
}

/* ================= しょうり / はいぼく / ほうしゅう ================= */
function victory(){
  const C=S.combat; if(!C) return;
  const kind=C.kind;
  const stage=stageOf(S.floor);
  S.combat=null;
  if(hasRelic("ribbon") && S.ch.id==="nozomi") S.hp=Math.min(S.maxHp,S.hp+4);
  if(kind==="boss"){
    if(S.floor===14){ midResult(); return; }        // まおう撃破 → ちゅうかんリザルト
    ending(true, 2); return;                          // やみのまおう撃破 → ステージ2エンディング
  }
  AudioEng.sfx("win"); AudioEng.playBGM("home");
  let base = 18+rnd(15);
  if(stage===2) base = Math.floor(base*1.5);          // ステージ2は ゴールド 1.5ばい
  let gold = base + (kind==="elite"?25:0) + (hasRelic("piggy")?15:0);
  gold = Math.floor(gold * DIFF.goldMul);
  S.gold += gold;
  AudioEng.sfx("coin");
  const scr=$("reward-screen"); scr.innerHTML="";

function rollCardRewards(n){
  const pool = Object.keys(CARDS).filter(id=>{
    const d=CARDS[id];
    return d.ch===S.ch.id && d.rar!=="S";
  });
  const weights = {C:5,U:3,R:1};
  const out=[]; const used=new Set();
  let guard=0;
  while(out.length<n && guard++<200){
    const bag=[];
    pool.forEach(id=>{ for(let i=0;i<weights[CARDS[id].rar];i++) bag.push(id); });
    const id=pick(bag);
    if(used.has(id)) continue;
    used.add(id);
    out.push(mkCard(id));
  }
  return out;
}

     {txt:"うでたて 100かい ささげる（HP-8、たからもの ゲット）",fn:()=>{S.hp=Math.max(1,S.hp-8);const p=RELIC_POOL.filter(r=>!hasRelic(r));if(p.length)gainRelic(pick(p));}},
     {txt:"どうぞうを そうじする（-25◆、カード1まい てばなす）",fn:null,remove:true},
     {txt:"おじぎして とおりすぎる",fn:()=>{}}
   ]},
  {glyph:"🕊️",title:"まいごの ハト",flavor:"あしに ちいさな ふくろを つけた ハトが まどべに とまった。ふくろには おかねと、だれかの てがみが はいっている。",
   opts:s=>[
     {txt:"おかねを あずかる（+45◆）",fn:()=>{S.gold+=45;AudioEng.sfx("coin");}},
     {txt:"そらへ にがす（HP6 かいふく）",fn:()=>{S.hp=Math.min(S.maxHp,S.hp+6);AudioEng.sfx("heal");}}
   ]},
  {glyph:"🚪",title:"あかずの とびら",flavor:"くさりの まかれた とびらの おくから、キラキラした おとが きこえる。あけるには ちからずくしか なさそうだ。",
   opts:s=>[
     {txt:"こじあける（HP-6、+70◆）",fn:()=>{S.hp=Math.max(1,S.hp-6);S.gold+=70;AudioEng.sfx("coin");}},
     {txt:"みなかったことに する",fn:()=>{}}
   ]},
  {glyph:"📦",title:"おうちからの こづつみ",flavor:"「がんばってるみんなへ」— とうの ふもとの おうちから、こづつみが とどいた。かぞくは いつでも みかたなのだ。",
   opts:s=>[
     {txt:"あける（HP8 かいふく ＆ +20◆）",fn:()=>{S.hp=Math.min(S.maxHp,S.hp+8);S.gold+=20;AudioEng.sfx("heal");}},
   ]}
];
function eventScreen(){
  const ev = pick(EVENTS);
  const scr=$("event-screen");
  scr.innerHTML=`<div style="font-size:48px">${ev.glyph}</div><h2>${ev.title}</h2>
    <p class="flavor">${ev.flavor}</p><div class="opt-col" id="ev-opts"></div>`;
  const box=$("ev-opts");
  ev.opts(S).forEach(o=>{
    const b=document.createElement("button"); b.textContent=o.txt;
    b.onclick=()=>{
      if(o.forge){ pickCardFromDeck("きょうかする カードを えらぼう", c=>!c.up, card=>{card.up=true; toast(`「${cname(card)}」が つよくなった!`); afterEvent();}, ()=>{}); return; }
      if(o.remove){
        if(S.gold<25){ toast("ゴールドが たりない…"); return; }
        pickCardFromDeck("てばなす カードを えらぼう", ()=>true, card=>{S.gold-=25; S.deck.splice(S.deck.indexOf(card),1); toast(`「${cname(card)}」を てばなした`); afterEvent();}, ()=>{});
        return;
      }
      const r=o.fn(); if(r==="stay") return;
      afterEvent();
    };
    box.appendChild(b);
  });
  updateTopbar();
  show("event-screen");
}
function afterEvent(){ updateTopbar(); afterNode(); }

/* ---------- カードずかん（タイトルから 参照）---------- */
let catalogUp = false;
function showCardList(){
  AudioEng.sfx("tap");
  const scr=$("cards-screen");
  scr.innerHTML=`<div style="display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:4px;">
      <h2 style="color:var(--gold)">📖 カードずかん</h2>
      <button id="cat-toggle" style="font-size:12px; padding:6px 12px;"></button>
      <button id="cat-back" style="font-size:12px; padding:6px 12px; border-color:var(--gold);">タイトルへ もどる</button>
    </div>
    <p class="small" style="text-align:center; margin-bottom:14px;">ぜんぶで ${Object.keys(CARDS).length}まい　（アタック / スキル / <span style="color:var(--pow)">パワー</span>）</p>
    <div id="cat-body"></div>`;
  const body=$("cat-body");
  [["kento","けんと（コンボ）"],["taichi","たいち（はつめい）"],["nozomi","のぞみ（おんぷ）"],["erika","えりか（ファンサ☆）"],["yushi","ゆうし（ほろよい）"],["none","きょうつう・エンシェント"]].forEach(([ch,label])=>{
    const ids=Object.keys(CARDS).filter(id=>CARDS[id].ch===ch);
    if(!ids.length) return;
    const sec=document.createElement("div"); sec.className="cat-section";
    const h=document.createElement("h3"); h.className="cat-head"; h.textContent=`${label}　${ids.length}まい`;
    if(ch!=="none" && CHARS[ch]) h.style.color=CHARS[ch].cc;
    sec.appendChild(h);
    const grid=document.createElement("div"); grid.className="cat-grid";
    ids.forEach(id=>grid.appendChild(cardEl({id, up:catalogUp})));
    sec.appendChild(grid);
    body.appendChild(sec);
  });
  const tog=$("cat-toggle");
  tog.textContent = catalogUp ? "きほんを みる" : "きょうか後(＋)を みる";
  tog.onclick=()=>{ AudioEng.sfx("tap"); catalogUp=!catalogUp; showCardList(); };
  $("cat-back").onclick=()=>{ AudioEng.sfx("tap"); show("title-screen"); };
  show("cards-screen");
}

/* ================= きどう ================= */

renderTitle();
